version: 1
generated_at: "2026-05-20"
generated_by: "maestro"
status: "active"

purpose: "Tool-agnostic model routing policy for workflow agents. Profiles are stable; provider model IDs are configurable."

selection_policy:
  source_of_truth: ".maestro/config/model-routing.yaml"
  rule_file: ".maestro/engine/rules/15-model-routing-observability-rules.md"
  prefer_profiles_over_hardcoded_models: true
  adapter_must_record_fallback: true
  do_not_fabricate_model_capability: true
  note: "Provider model names, access, pricing, and limits change. Treat model_id fields as defaults or aliases that a local adapter may override."

provider_defaults:
  claude:
    deep_reasoning:
      model_family: "opus"
      model_id: "opus"
      reasoning_effort: "high"
    coding:
      model_family: "sonnet"
      model_id: "sonnet"
      reasoning_effort: "medium"
    fast:
      model_family: "sonnet"
      model_id: "sonnet"
      reasoning_effort: "low"
  codex:
    deep_reasoning:
      model_family: "gpt-5.5"
      model_id: "gpt-5.5"
      reasoning_effort: "high"
    coding:
      model_family: "codex"
      model_id: "gpt-5.3-codex"
      reasoning_effort: "medium"
    fast:
      model_family: "gpt-5.4-mini"
      model_id: "gpt-5.4-mini"
      reasoning_effort: "low"
  generic:
    deep_reasoning:
      model_family: "best-available-reasoning"
      model_id: "tool-default-deep"
      reasoning_effort: "high"
    coding:
      model_family: "best-available-coding"
      model_id: "tool-default-coding"
      reasoning_effort: "medium"
    fast:
      model_family: "tool-default-fast"
      model_id: "tool-default-fast"
      reasoning_effort: "low"

model_overrides:
  enabled: true
  purpose: "Scoped model switching without editing provider_defaults or agent files."
  precedence:
    - "emergency_runtime_override"
    - "agent_overrides"
    - "phase_overrides"
    - "provider_profile_overrides"
    - "provider_defaults"
  policy:
    require_reason: true
    require_activity_record: true
    require_expires_at_for_emergency: true
    must_keep_profile_contracts: true
    do_not_edit_agent_files_for_model_switch: true
    valid_provider_profiles:
      - "deep_reasoning"
      - "coding"
      - "fast"
  provider_profile_overrides:
    claude: {}
    codex: {}
    generic: {}
  agent_overrides: {}
  phase_overrides: {}
  emergency_runtime_override:
    enabled: false
    provider: null
    provider_profile: null
    model_id: null
    reason: null
    expires_at: null

model_profiles:
  fast_router:
    intent: "Routing, status, lightweight docs/framework maintenance."
    default_provider_profile: "fast"
    eta_seconds_hint: 60
  deep_reasoning:
    intent: "Ambiguous requirements, architecture, policy, blocker classification, high-risk reasoning."
    default_provider_profile: "deep_reasoning"
    eta_seconds_hint: 600
  coding:
    intent: "Implementation, refactor, test updates, service-specific code changes."
    default_provider_profile: "coding"
    eta_seconds_hint: 900
  coding_planner:
    intent: "Implementation planning, coder assignment, integration review."
    default_provider_profile: "coding"
    escalate_to: "deep_reasoning"
    eta_seconds_hint: 600
  verification:
    intent: "Build/test evidence review, QC execution, Code Done readiness."
    default_provider_profile: "coding"
    escalate_to: "deep_reasoning"
    eta_seconds_hint: 420
  memory_light:
    intent: "Memory/index updates and concise durable summaries."
    default_provider_profile: "fast"
    eta_seconds_hint: 180

agent_model_map:
  workflow_agents:
    coordinator:
      model_profile: "fast_router"
      escalate_when: ["state dispute", "approval gate ambiguity", "high-risk scope decision"]
    onboarding:
      model_profile: "deep_reasoning"
      reason: "Universal project profiling and context economy decisions need high recall."
    agent-factory:
      model_profile: "coding_planner"
      reason: "Generates coder contracts and permission scopes."
    task-analysis:
      model_profile: "deep_reasoning"
      reason: "Normalizes intent, acceptance criteria, risks, and context_plan."
    solution-architect:
      model_profile: "deep_reasoning"
      reason: "Architecture/security/data/contract tradeoffs."
    coder-leader:
      model_profile: "coding_planner"
      escalate_when: ["architecture conflict", "cross-service contract ambiguity", "security risk"]
    dev-verification:
      model_profile: "verification"
    qc-handoff:
      model_profile: "fast_router"
    qc-runner:
      model_profile: "verification"
    bug-router:
      model_profile: "deep_reasoning"
      downgrade_when: "non-blocker cosmetic or docs-only defects"
    memory-update:
      model_profile: "memory_light"
    workflow-policy:
      model_profile: "deep_reasoning"
  built_in_coders:
    coder-infra:
      model_profile: "coding"
      escalate_when: ["production deploy", "IAM/security", "destructive operation", "multi-environment topology"]
    coder-database:
      model_profile: "coding"
      escalate_when: ["destructive migration", "data loss risk", "compatibility risk"]
    coder-data:
      model_profile: "coding"
      escalate_when: ["large/perf dataset", "complex referential integrity", "loading into shared/remote store"]
  generated_service_coders:
    default_model_profile: "coding"
    escalate_when: ["public contract change", "security-sensitive code", "cross-service ownership unclear"]
  # Specialist advisors (class 4): advisor-only, triệu hồi trong pipeline. Không phải workflow agents.
  # Profiles tái dùng các profile chuẩn (không thêm profile mới).
  specialist_advisors:
    api-designer:
      model_profile: "coding"
      category: "architecture"
    database-architect:
      model_profile: "deep_reasoning"
      category: "architecture"
    cloud-architect:
      model_profile: "deep_reasoning"
      category: "architecture"
    event-architect:
      model_profile: "deep_reasoning"
      category: "architecture"
    ui-ux-designer:
      model_profile: "coding"
      category: "architecture"
    security-auditor:
      model_profile: "deep_reasoning"
      category: "quality-security"
    performance-engineer:
      model_profile: "deep_reasoning"
      category: "quality-security"
    accessibility-auditor:
      model_profile: "coding"
      category: "quality-security"
    code-reviewer:
      model_profile: "deep_reasoning"
      category: "quality-security"
    discovery-analyst:
      model_profile: "deep_reasoning"
      category: "product"
    business-analyst:
      model_profile: "coding"
      category: "product"
    product-strategist:
      model_profile: "deep_reasoning"
      category: "product"
    data-engineer:
      model_profile: "coding"
      category: "data-ai"
    eval-engineer:
      model_profile: "deep_reasoning"
      category: "data-ai"
    ml-ai-architect:
      model_profile: "deep_reasoning"
      category: "data-ai"
    sre-observability:
      model_profile: "coding"
      category: "ops-devex"
    technical-writer:
      model_profile: "memory_light"
      category: "ops-devex"
    migration-strategist:
      model_profile: "deep_reasoning"
      category: "ops-devex"
    tech-researcher:
      model_profile: "deep_reasoning"
      category: "research-qa"
    qa-strategist:
      model_profile: "coding"
      category: "research-qa"

observability:
  activity_file: ".maestro/runtime/agent-activity.yaml"
  response_ui_file: ".maestro/config/response-ui.yaml"
  status_command: "/status"
  activity_update_cli: "python3 scripts/agent-activity.py <start|heartbeat|block|complete>"
  architecture_health_cli: "python3 scripts/architecture-health-check.py --strict"
  heartbeat_policy: "Record start/end for every workflow phase; update long-running work when the current action changes."
