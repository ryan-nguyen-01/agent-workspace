<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">Skill composition</title>
  <desc id="desc">How skills are selected, composed, and attached to agents.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9ca3af"/></marker>
    <style>
      .bg{fill:#111827}.panel{fill:#172033;stroke:#374151;stroke-width:2;rx:18}.title{fill:#f9fafb;font:700 26px Arial}.subtitle{fill:#cbd5e1;font:400 14px Arial}.box{stroke-width:1.5;rx:10}.agent{fill:#1e3a5f;stroke:#60a5fa}.memory{fill:#14532d;stroke:#86efac}.gate{fill:#78350f;stroke:#fbbf24}.neutral{fill:#374151;stroke:#9ca3af}.text{fill:#f8fafc;font:700 15px Arial;text-anchor:middle;dominant-baseline:middle}.small{fill:#d1d5db;font:600 12px Arial;text-anchor:middle;dominant-baseline:middle}.edge{fill:none;stroke:#9ca3af;stroke-width:2;marker-end:url(#arrow)}.lane{fill:#0f172a;stroke:#334155;stroke-width:1.5;rx:14}.laneText{fill:#e5e7eb;font:700 17px Arial}.label{fill:#e5e7eb;font:700 13px Arial}
    </style>
  </defs>
  <rect class="bg" width="1500" height="760"/>
  <rect class="panel" x="30" y="30" width="1440" height="700"/>
  <text class="title" x="70" y="78">Skill Composition: Agent ≠ Skill</text>
  <text class="subtitle" x="70" y="108">One agent uses many skills. One skill serves many agents. Skills are selected by task context.</text>

  <!-- Skill types -->
  <rect class="lane" x="60" y="140" width="430" height="540"/>
  <text class="laneText" x="90" y="175">Skill types</text>

  <rect class="box agent" x="90" y="200" width="180" height="70"/><text class="text" x="180" y="228">Required Skills</text><text class="small" x="180" y="248">always loaded</text>
  <text class="small" x="180" y="290">skill-service-coder</text>
  <text class="small" x="180" y="308">skill-project-brain</text>
  <text class="small" x="180" y="326">skill-workflow-policy</text>

  <rect class="box gate" x="290" y="200" width="180" height="70"/><text class="text" x="380" y="228">Optional Skills</text><text class="small" x="380" y="248">loaded by task need</text>
  <text class="small" x="380" y="290">security (auth task)</text>
  <text class="small" x="380" y="308">migration (DB task)</text>
  <text class="small" x="380" y="326">performance (perf task)</text>

  <rect class="box memory" x="90" y="370" width="380" height="70"/><text class="text" x="280" y="398">Contextual Skills</text><text class="small" x="280" y="418">from Project Brain + Service Brain stack</text>
  <text class="small" x="280" y="460">language: typescript  |  framework: nestjs</text>
  <text class="small" x="280" y="478">database: prisma  |  api: rest  |  testing: jest</text>

  <rect class="box neutral" x="90" y="530" width="380" height="55"/><text class="text" x="280" y="550">Artifact Skills</text><text class="small" x="280" y="570">qc-handoff, bug-routing, documentation</text>

  <!-- Selection flow -->
  <rect class="lane" x="520" y="140" width="450" height="540"/>
  <text class="laneText" x="550" y="175">Selection flow</text>

  <rect class="box neutral" x="550" y="205" width="200" height="50"/><text class="text" x="650" y="230">1. Task Analysis</text>
  <text class="small" x="650" y="267">identify intent, risks, services</text>

  <rect class="box agent" x="550" y="290" width="200" height="50"/><text class="text" x="650" y="315">2. Coder Leader</text>
  <text class="small" x="650" y="352">check service brains</text>

  <rect class="box agent" x="550" y="375" width="200" height="50"/><text class="text" x="650" y="400">3. Select Coders</text>
  <text class="small" x="650" y="437">from agent-registry</text>

  <rect class="box memory" x="550" y="460" width="200" height="50"/><text class="text" x="650" y="485">4. Load Skills</text>
  <text class="small" x="650" y="522">required + contextual + optional</text>

  <rect class="box gate" x="550" y="545" width="200" height="50"/><text class="text" x="650" y="570">5. Record Used</text>
  <text class="small" x="650" y="607">in coder-results.yaml</text>

  <path class="edge" d="M650 255V290"/>
  <path class="edge" d="M650 340V375"/>
  <path class="edge" d="M650 425V460"/>
  <path class="edge" d="M650 510V545"/>

  <!-- Example agent -->
  <rect class="lane" x="1000" y="140" width="430" height="540"/>
  <text class="laneText" x="1030" y="175">Example: coder-payment-service</text>

  <rect class="box agent" x="1030" y="210" width="180" height="50"/><text class="text" x="1120" y="228">Workflow</text><text class="small" x="1120" y="248">skill-service-coder</text>
  <rect class="box agent" x="1230" y="210" width="180" height="50"/><text class="text" x="1320" y="228">Verification</text><text class="small" x="1320" y="248">skill-dev-verification</text>

  <rect class="box memory" x="1030" y="300" width="180" height="50"/><text class="text" x="1120" y="318">TypeScript</text><text class="small" x="1120" y="338">skill-lang-typescript</text>
  <rect class="box memory" x="1230" y="300" width="180" height="50"/><text class="text" x="1320" y="318">NestJS</text><text class="small" x="1320" y="338">skill-framework-nestjs</text>

  <rect class="box memory" x="1030" y="390" width="180" height="50"/><text class="text" x="1120" y="408">Prisma</text><text class="small" x="1120" y="428">skill-database-prisma</text>
  <rect class="box memory" x="1230" y="390" width="180" height="50"/><text class="text" x="1320" y="408">REST API</text><text class="small" x="1320" y="428">skill-api-rest</text>

  <rect class="box gate" x="1030" y="480" width="180" height="50"/><text class="text" x="1120" y="498">Security</text><text class="small" x="1120" y="518">skill-security-hardening</text>
  <rect class="box gate" x="1230" y="480" width="180" height="50"/><text class="text" x="1320" y="498">Jest Testing</text><text class="small" x="1320" y="518">skill-testing-jest</text>

  <rect class="box neutral" x="1030" y="570" width="380" height="50"/><text class="text" x="1220" y="588">Artifact: skill-qc-handoff</text><text class="small" x="1220" y="608">+ skill-bug-routing</text>

  <!-- Cross arrows -->
  <path class="edge" d="M470 235H550"/>
  <path class="edge" d="M470 405H550"/>
  <path class="edge" d="M750 485H1030"/>
</svg>
