  coder_results: ".claude/tasks/{{TASK_ID}}/coder-results.yaml"
  dev_verification: ".claude/tasks/{{TASK_ID}}/dev-verification.yaml"
  qc_handoff: ".claude/tasks/{{TASK_ID}}/qc-handoff.md"
  qc_results: ".claude/tasks/{{TASK_ID}}/qc-test-results.yaml"
  bugs: ".claude/tasks/{{TASK_ID}}/bugs.yaml"
  memory_updates: ".claude/tasks/{{TASK_ID}}/memory-updates.yaml"

history:
