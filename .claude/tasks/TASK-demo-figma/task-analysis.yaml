task_id: "TASK-demo-figma"
source_type: "text"
created_at: "2026-04-17"
analyzed_by: "task-analysis"

intent: "feature"
summary: "Implement trang Home cho fashion e-commerce store từ Figma design. Bao gồm header, hero, product grids, collections, gallery, và footer."
business_goal: "Tạo landing page thương mại điện tử thời trang theo đúng design specification từ Figma, đảm bảo pixel-accurate với design tokens và responsive."

acceptance_criteria:
  - id: "AC-1"
    description: "Header nav hiển thị đúng: Home, Collections, New + icons + Cart button (pill shape)"
    critical: true
  - id: "AC-2"
    description: "Hero section hiển thị New Collection title, Summer 2024, Go To Shop CTA, 2 product cards lớn"
    critical: true
  - id: "AC-3"
    description: "New This Week grid: 4 cột product cards (304x313), wishlist icon, category/title/price"
    critical: true
  - id: "AC-4"
    description: "XIV Collections section: filter tabs (All/Men/Women/KID), sort controls, 3-col product grid"
    critical: true
  - id: "AC-5"
    description: "Footer: Info nav, Languages, Technologies (VR/XIV/QR), copyright bar"
    critical: false
  - id: "AC-6"
    description: "Design tokens (colors, typography, spacing) match extracted design-tokens.json"
    critical: true

out_of_scope:
  - "Responsive mobile layout (chỉ desktop 1440px trong design)"
  - "Backend API integration (mock data)"
  - "Checkout/cart flow"
  - "User authentication"

impacted_services:
  - service: "frontend"
    changes: "Tạo mới Home page component với 8 sections"

technical_requirements:
  - "React + Tailwind CSS (match output format từ Figma MCP)"
  - "Custom fonts: Beatrice Deck Trial, Beatrice Trial, Beatrice Headline Trial, Inter"
  - "Design tokens áp dụng qua Tailwind config hoặc CSS variables"
  - "Image assets cần download từ Figma asset URLs (temporary links)"

contract_changes:
  apis: []
  events: []
  schemas: []
  ui:
    - "New route: / (Home page)"
    - "New components: ProductCard, NavArrow, SectionTitle, SearchBar, CartButton"
  config: []

# ===== DESIGN REFERENCES — đã trích xuất từ Figma MCP =====
design_references:
  figma_urls:
    - url: "https://www.figma.com/design/7xrPkquBzkRr2HLgTMKqr8/Fashion-Ecommerce-Store?node-id=2-63"
      node_id: "2:63"
      description: "Home page — full page frame (1440x3998px)"
  screenshots: []
    # Không có screenshot riêng — dùng design-context.md với code reference thay thế
  design_notes: |
    - Output từ Figma MCP là React + Tailwind CSS reference code
    - Design dùng absolute positioning (không responsive) — cần chuyển sang flex/grid
    - Grain texture overlay (mix-blend-luminosity, opacity-20) có thể giữ hoặc bỏ tuỳ performance
    - Font Beatrice là trial font — cần license hoặc thay thế
    - Image asset URLs là temporary (cần download trước khi expire)
  component_specs:
    - component: "ProductCard"
      states: ["default", "hover (infer)", "loading (skeleton)"]
      responsive_breakpoints: []
      interactions: ["click → product detail", "wishlist icon toggle"]
    - component: "FilterTabs"
      states: ["active (bold)", "inactive (#8a8a8a)"]
      responsive_breakpoints: []
      interactions: ["click → filter products", "sort dropdown"]
    - component: "SearchBar"
      states: ["default (placeholder)", "focused (infer)"]
      responsive_breakpoints: []
      interactions: ["type → search results (out of scope)"]

  # Paths to local extracted assets
  local_assets:
    design_context: ".claude/tasks/TASK-demo-figma/assets/design-context.md"
    design_tokens: ".claude/tasks/TASK-demo-figma/assets/design-tokens.json"
    screen_map: ".claude/tasks/TASK-demo-figma/assets/screen-map.yaml"

risks:
  - id: "RISK-1"
    description: "Beatrice font family là trial — cần license cho production"
    severity: "medium"
    mitigation: "Dùng fallback Google Font hoặc mua license"
  - id: "RISK-2"
    description: "Figma asset URLs expire — cần download images sớm"
    severity: "high"
    mitigation: "Download tất cả assets ngay sau extraction, lưu vào project"
  - id: "RISK-3"
    description: "Design dùng absolute positioning — cần refactor sang responsive layout"
    severity: "low"
    mitigation: "Chuyển sang CSS Grid/Flexbox, giữ design tokens"

blockers: []
dependencies: []

requires_user_clarification: false
clarifying_questions: []

critical_checks:
  - id: "CC-1"
    description: "Design tokens (colors, typography) match design-tokens.json"
    reason: "Đảm bảo visual consistency với Figma design"
  - id: "CC-2"
    description: "All 8 page sections render correctly"
    reason: "Mỗi section là một acceptance criteria"
  - id: "CC-3"
    description: "Product card component reusable across sections 3, 4, 5"
    reason: "DRY principle — same card pattern used 3 times"

dev_verification_checklist:
  - "[ ] Header nav links render đúng typography"
  - "[ ] Hero section layout match design"
  - "[ ] Product cards (small + large) render đúng border, size"
  - "[ ] New This Week grid 4 columns"
  - "[ ] Collections filter tabs work (visual only)"
  - "[ ] Footer layout match design"
  - "[ ] Design tokens áp dụng consistent"

qc_focus:
  - "Visual comparison: mỗi section vs design-context.md"
  - "Typography: font family, size, weight, spacing match design-tokens.json"
  - "Colors: tất cả hex values match design-tokens.json"
  - "Component reuse: ProductCard dùng chung across sections"

reuse_and_convention_analysis:
  project_flows_relevant: []
  service_flows_relevant: []
  reusable_assets_to_use:
    - "ProductCard component (2 variants: small 304x313, large 366x376)"
    - "NavArrow component (left/right)"
    - "SectionTitle component (2 variants)"
  coding_conventions_to_follow:
    - "Tailwind utility classes cho styling"
    - "Design tokens qua tailwind.config hoặc CSS variables"
  anti_patterns_to_avoid:
    - "Không copy absolute positioning từ Figma output — chuyển sang flex/grid"
    - "Không hardcode colors — dùng design tokens"
  new_reusable_asset_needed:
    required: true
    reason: "ProductCard, NavArrow, SectionTitle là components mới dùng across sections"
    approval_or_leader_review_required: true
  evidence:
    - ".claude/tasks/TASK-demo-figma/assets/design-context.md"
    - ".claude/tasks/TASK-demo-figma/assets/design-tokens.json"
    - ".claude/tasks/TASK-demo-figma/assets/screen-map.yaml"

user_approved: false  # Chờ user review
