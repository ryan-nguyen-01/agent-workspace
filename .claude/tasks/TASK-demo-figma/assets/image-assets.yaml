# Image & Icon Asset Inventory
# Extracted from Figma: Fashion E-commerce Home (node 2:63)
# fileKey: 7xrPkquBzkRr2HLgTMKqr8

# ──────────────────────────────────────────────────────────
# FIGMA TIER determines image handling strategy:
#   high = 200 calls/day → coders can call get_screenshot live
#   low  = 6 calls/month → everything pre-extracted, coders read local only
# ──────────────────────────────────────────────────────────
figma_tier: low
figma_plan: "Starter (6 MCP calls/month)"
tier_strategy: |
  LOW TIER mode: All icons must be pre-exported or matched to icon library.
  Product images use placeholder_spec with exact dimensions so real images
  swap in pixel-perfect. Coders NEVER call Figma MCP.

export_instructions:
  svg_icons: |
    Use Figma REST API to export as SVG:
    GET https://api.figma.com/v1/images/7xrPkquBzkRr2HLgTMKqr8?ids={node_id}&format=svg
    Header: X-FIGMA-TOKEN: <your-token>
    Response: { images: { "node_id": "https://..." } }
    Download the URL and save locally.
  png_images: |
    Use Figma REST API to export as PNG:
    GET https://api.figma.com/v1/images/7xrPkquBzkRr2HLgTMKqr8?ids={node_id}&format=png&scale=2
    Or use MCP get_screenshot on the specific node.
  icon_library_alternative: |
    Many icons match standard icon libraries (Lucide, Heroicons, Phosphor).
    Prefer library icons over exported SVGs for smaller bundle size.

