    name: "divider-horizontal"
    type: decorative
    usage: "Section separator"
    css_alternative: "border-bottom: 1px solid #d7d7d7"
    export_priority: skip  # Use CSS

  - node_id: "Line7"
    name: "divider-horizontal-2"
    type: decorative
    usage: "Section separator"
    css_alternative: "border-bottom: 1px solid #d7d7d7"
    export_priority: skip  # Use CSS

product_images:
  note: |
    Product images in Figma are PLACEHOLDERS (stock photos).
    In production, these should come from your CMS/product API.
    Do NOT export these from Figma — use real product images instead.
    Implement with: <img src={product.imageUrl} alt={product.name} loading="lazy" />

  # placeholder_spec: EXACT container specs from Figma so real images fit 100%
  # Coders must implement image containers with these EXACT dimensions.
  # When CMS/API provides real images → they swap in pixel-perfect.

  placeholders:
    - node_ids: ["Rectangle12", "Rectangle13", "Rectangle14", "Rectangle15"]
      section: "New This Week grid"
      placeholder_spec:
        width: 304
        height: 313
        aspect_ratio: "304:313"
        object_fit: cover
        border: "1px solid #d7d7d7"
        border_radius: "0px"
        background_color: "#f5f5f5"
        alt_text_pattern: "${product.name} - ${product.category}"
        loading: lazy

    - node_ids: ["Rectangle16", "Rectangle17"]
      section: "XIV Collections carousel"
      placeholder_spec:
        width: 366
        height: 376
        aspect_ratio: "366:376"
        object_fit: cover
        border: "none"
        border_radius: "0px"
        background_color: "#e8e8e8"
        alt_text_pattern: "${collection.name} collection"
        loading: lazy

    - node_ids: ["Rectangle18", "Rectangle19", "Rectangle20", "Rectangle21", "Rectangle22"]
      section: "Our Approach section"
      placeholder_spec:
        width: mixed  # editorial layout, sizes vary per item
        height: mixed
        aspect_ratio: "varies"
        object_fit: cover
        border: "none"
        border_radius: "0px"
        background_color: "#f5f5f5"
        alt_text_pattern: "${approach.title}"
        loading: lazy
      notes: "Editorial layout — see design-context.md Section 7 for individual sizing"

summary:
  figma_tier: low
  total_icons: 10
  required_icons: 7
  nice_to_have_icons: 3
  icons_with_library_match: 6  # search, user, wishlist, wishlist-overlay, arrows, scroll-top
  icons_need_export: 1         # logo only (custom)
  decorative_skip: 2
  product_placeholders: 11
  placeholders_with_spec: 11   # all have placeholder_spec for pixel-perfect swap
  recommended_approach: |
    LOW TIER (6 calls/month):
    1. Use icon library (Lucide/Heroicons) for 6 standard icons — zero API calls
    2. Export ONLY logo (Group6) via Figma REST API — 1 API call
    3. Skip decorative elements — use CSS borders/dividers
    4. Product images: implement containers with EXACT placeholder_spec
       → When real images from CMS are plugged in, they fit 100%
    5. Total Figma API calls needed: 1 (logo export only)
    
    HIGH TIER (200 calls/day):
    1. Same icon library approach (still preferred for bundle size)
    2. Can call get_screenshot on any node for visual verification
    3. Can export icons live during coding without budget worry
    4. Product images still from CMS (never export Figma placeholders)
