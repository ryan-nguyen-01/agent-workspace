summary: |
  Implement frontend auth: AuthContext, Login/Register pages, ProtectedRoute component.
  - AuthContext: quản lý auth state (user, token, isAuthenticated), provide login/register/logout methods
  - Token stored in React state (memory), không localStorage (XSS protection)
  - HTTP client auto-attach Authorization: Bearer header
  - 401 response → auto logout và redirect /login
  - ProtectedRoute wrapper: redirect /login nếu chưa authenticated

decisions:
  - decision: "Token stored in memory (React state), không localStorage"
    reason: "XSS protection — localStorage accessible by any JS on page. Task analysis CC-04."
  - decision: "Login/Register dùng controlled form, không third-party form library"
    reason: "Simple form, 2-3 fields, không cần Formik/react-hook-form overhead."
  - decision: "Redirect /login sau logout thay vì show modal"
    reason: "Clean UX, consistent với convention project (page-based navigation)"
  - decision: "Loading state hiển thị spinner khi auth check đang pending"
    reason: "Tránh flash of protected content trước khi auth state resolved"

