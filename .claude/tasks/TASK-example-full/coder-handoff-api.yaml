summary: |
  Implement full JWT auth flow: register, login, auth middleware, protected routes.
  - POST /api/auth/register: validate input → hash password (bcrypt 12 rounds) → insert user → return JWT
  - POST /api/auth/login: lookup by email → verify bcrypt → return JWT (24h expiry)
  - Auth middleware: extract Bearer token → verify JWT → attach user to request
  - GET /api/auth/me: protected endpoint returning current user profile

decisions:
  - decision: "Bcrypt salt rounds = 12"
    reason: "Balance giữa security và performance. OWASP recommends 10+."
  - decision: "JWT expiry 24 giờ (không có refresh token)"
    reason: "Task analysis AC-7 marked refresh token as deferred (P2). Chỉ implement access token."
  - decision: "Password validation: min 8 chars, uppercase, lowercase, number"
    reason: "OWASP password guidelines. Không quá strict để tránh user friction."
  - decision: "Trả 401 generic message cho cả wrong email và wrong password"
    reason: "Tránh user enumeration attack (critical check CC-02)"
  - decision: "Dùng async bcrypt.compare thay vì sync"
    reason: "Không blocking event loop — project convention"

