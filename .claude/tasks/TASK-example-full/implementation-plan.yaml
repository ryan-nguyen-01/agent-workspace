task_id: TASK-example-full
version: 1

approach: "multi-service"
rationale: "Task ảnh hưởng 3 services: API (auth logic), Frontend (auth UI + token mgmt), Database (users table). Cần coordination giữa API contract và Frontend integration."

steps:
  - step: 1
    description: "Tạo database migration cho users table (id, email, password_hash, name, created_at, updated_at)"
    service: "database"
    coder: "coder-database"
    dependencies: []

  - step: 2
    description: "Tạo JWT utility module (sign, verify, decode) và auth config từ env vars"
    service: "api"
    coder: "coder-api"
    dependencies: []

  - step: 3
    description: "Tạo AuthService với register() và login() methods, dùng bcrypt cho password"
    service: "api"
    coder: "coder-api"
    dependencies: [1, 2]

  - step: 4
    description: "Tạo auth middleware kiểm tra JWT token từ Authorization header"
    service: "api"
    coder: "coder-api"
    dependencies: [2]

  - step: 5
    description: "Tạo AuthController với POST /api/auth/register và POST /api/auth/login"
    service: "api"
    coder: "coder-api"
    dependencies: [3, 4]

  - step: 6
    description: "Tạo AuthContext và AuthProvider trong frontend cho state management"
    service: "frontend"
    coder: "coder-frontend"
    dependencies: [5]

  - step: 7
    description: "Cập nhật HTTP client thêm Authorization header interceptor"
    service: "frontend"
    coder: "coder-frontend"
    dependencies: [5, 6]

  - step: 8
    description: "Tạo Login page và Register page trong frontend"
    service: "frontend"
    coder: "coder-frontend"
    dependencies: [6, 7]

integration_points:
  - from: "api"
    to: "frontend"
    type: "api_contract"
    spec: "POST /api/auth/register → { token, user } | 409 Conflict"
  - from: "api"
    to: "frontend"
    type: "api_contract"
    spec: "POST /api/auth/login → { token, user } | 401 Unauthorized"
  - from: "api"
    to: "frontend"
    type: "error_contract"
    spec: "Auth middleware → 401 khi token missing/invalid/expired"

contracts:
  - type: "api"
    spec: "POST /api/auth/register { email, password, name } → { token, user: UserDto }"
  - type: "api"
    spec: "POST /api/auth/login { email, password } → { token, user: UserDto }"
  - type: "api"
    spec: "Authorization: Bearer <token> header trên mọi authenticated endpoint"
  - type: "database"
    spec: "users(id UUID PK, email UNIQUE, password_hash, name, created_at, updated_at)"

estimated_complexity: "medium"
