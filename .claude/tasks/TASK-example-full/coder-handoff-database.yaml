decisions:
  - decision: "UUID thay vì auto-increment cho PK"
    reason: "Project convention, tránh enumeration attacks, safe cho distributed systems"
  - decision: "password_hash VARCHAR(255) thay vì VARCHAR(60)"
    reason: "Bcrypt output 60 chars nhưng để room cho algorithm upgrade (argon2 dài hơn)"
  - decision: "Thêm index trên email"
    reason: "Login endpoint sẽ query by email, cần fast lookup"

