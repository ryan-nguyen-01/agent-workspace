    title: "Refresh token chưa implement"
    acceptance_criteria: [AC-7]
    severity: "non-blocker"
    description: "Access token 24h hoạt động. Refresh token 7d chưa implement — deferred cho sprint sau."
    impact: "User phải re-login sau 24h thay vì auto-refresh."

