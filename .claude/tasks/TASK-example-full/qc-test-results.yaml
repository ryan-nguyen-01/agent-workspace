task_id: TASK-example-full
qc_state: "QC_DONE"
tested_at: "2025-04-17T16:30:00Z"
tested_by: "qc-runner"

summary: "13 test cases executed. 12 pass, 1 known limitation (refresh token). Zero blockers."

test_cases:
  # --- Register ---
  - id: TC-01
    title: "Register với email, password, name hợp lệ"
    acceptance_criteria: [AC-1]
    type: "functional"
    steps:
      - "POST /api/auth/register { email: 'user@test.com', password: 'Abc123!@', name: 'User A' }"
    expected: "201 Created, response có { token, user: { id, email, name } }"
    actual: "201 Created, response đúng format. Token decode được, chứa userId."
    status: "pass"

  - id: TC-02
    title: "Register với email đã tồn tại"
    acceptance_criteria: [AC-1]
    type: "edge_case"
    steps:
      - "POST /api/auth/register (lần 1) — thành công"
      - "POST /api/auth/register (lần 2, cùng email)"
    expected: "409 Conflict, message rõ ràng"
    actual: "409 Conflict, body: { error: 'Email already exists' }"
    status: "pass"

  - id: TC-03
    title: "Register thiếu required fields"
    acceptance_criteria: [AC-1]
    type: "validation"
    steps:
      - "POST /api/auth/register { email: 'x@y.com' } — thiếu password & name"
    expected: "400 Bad Request, validation errors"
    actual: "400, body: { errors: [{ field: 'password', message: 'required' }, ...] }"
    status: "pass"

  # --- Login ---
  - id: TC-04
    title: "Login với credentials đúng"
    acceptance_criteria: [AC-2]
    type: "functional"
    steps:
      - "Register user trước"
      - "POST /api/auth/login { email, password }"
    expected: "200 OK, response có { token, user }"
    actual: "200 OK, token hợp lệ. User object không chứa password_hash."
    status: "pass"

  - id: TC-05
    title: "Login với password sai"
    acceptance_criteria: [AC-2]
    type: "security"
    steps:
      - "POST /api/auth/login { email: 'user@test.com', password: 'WrongPassword!' }"
    expected: "401 Unauthorized, message generic (không leak user existence)"
    actual: "401, body: { error: 'Invalid credentials' }. Không phân biệt email sai hay password sai."
    status: "pass"

  - id: TC-06
    title: "Login với email không tồn tại"
    acceptance_criteria: [AC-2]
    type: "security"
    steps:
      - "POST /api/auth/login { email: 'nobody@test.com', password: 'Abc123!' }"
    expected: "401 Unauthorized, cùng message với TC-05"
    actual: "401, body: { error: 'Invalid credentials' }. Timing tương tự TC-05 (bcrypt compare luôn chạy)."
    status: "pass"

  # --- Auth Middleware ---
  - id: TC-07
    title: "Protected endpoint với valid token"
    acceptance_criteria: [AC-3]
    type: "functional"
    steps:
      - "Login → lấy token"
      - "GET /api/users/me -H 'Authorization: Bearer {token}'"
    expected: "200 OK, trả user data"
    actual: "200 OK, user data đúng."
    status: "pass"

  - id: TC-08
    title: "Protected endpoint không có token"
    acceptance_criteria: [AC-3]
    type: "security"
    steps:
      - "GET /api/users/me (không có Authorization header)"
    expected: "401 Unauthorized"
    actual: "401, body: { error: 'Authentication required' }"
    status: "pass"

  - id: TC-09
    title: "Protected endpoint với token hết hạn"
    acceptance_criteria: [AC-3, AC-7]
    type: "security"
    steps:
      - "Tạo token với exp = now - 1h (test helper)"
      - "GET /api/users/me -H 'Authorization: Bearer {expired_token}'"
    expected: "401 Unauthorized"
    actual: "401, body: { error: 'Token expired' }"
    status: "pass"

  - id: TC-10
    title: "Protected endpoint với token malformed"
    acceptance_criteria: [AC-3]
    type: "security"
    steps:
      - "GET /api/users/me -H 'Authorization: Bearer abc.def.ghi'"
    expected: "401 Unauthorized"
    actual: "401, body: { error: 'Invalid token' }. Không leak JWT implementation details."
    status: "pass"

  # --- Frontend Integration ---
  - id: TC-11
    title: "Frontend gửi token trong requests"
    acceptance_criteria: [AC-4]
    type: "integration"
    steps:
      - "Login trên frontend"
      - "Navigate trang protected"
      - "Kiểm tra network tab: request có Authorization header"
    expected: "Mọi API request gửi kèm Bearer token"
    actual: "HTTP client interceptor attach token. Network tab confirm header present."
    status: "pass"

  - id: TC-12
    title: "Frontend redirect khi 401"
    acceptance_criteria: [AC-5]
    type: "integration"
    steps:
      - "Manually expire token hoặc clear từ DevTools"
      - "Navigate trang protected"
    expected: "Redirect về /login, AuthContext cleared"
    actual: "401 → AuthContext.logout() → redirect /login. Token cleared from memory."
    status: "pass"

  # --- Security ---
  - id: TC-13
    title: "Password không xuất hiện trong response"
    acceptance_criteria: [AC-6]
    type: "security"
    steps:
      - "Register → check response body"
      - "Login → check response body"
      - "GET /api/users/me → check response body"
    expected: "Không có field password, password_hash trong bất kỳ response nào"
    actual: "Tất cả responses dùng UserDto (chỉ id, email, name). password_hash excluded."
    status: "pass"

bugs_found: []

known_limitations:
