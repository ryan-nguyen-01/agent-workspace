schema_version: "1.0"
subtask_id: "{{SUBTASK_ID}}"
task_id: "{{TASK_ID}}"          # parent task this subtask belongs to (parent holds links, R-022-12)
purpose_ref: "{{AC_ID}}"         # R-024: the acceptance criterion this serves
title: "{{TITLE}}"
status: "ready"
owner: null

objective: ""
acceptance_criteria: []          # the specific AC ids this subtask satisfies (AC-<story>.<n>)
depends_on: []
allowed_paths: []                # code-layout target paths (R-006 scope)
skills: []

# Self-contained document bundle (R-022-13): attach the exact docs this subtask works from (link, do not
# copy). Fill the entries the coder type needs (R-021): requirement/design/api/error_codes/ui_ux/rules/data.
context_bundle:
  requirement: []                # { id: "<KEY>-US-NNN", acceptance_criteria: [...], path: "..." }
  design: []                     # HLD/LLD ids + paths
  api_contract: null
  error_codes: []                # Error Catalog codes used here
  ui_ux: []                      # frontend screen/prototype paths
  business_rules: []
  data_model: null

verification:
  owner: "agent|user|shared"
  checks: []
