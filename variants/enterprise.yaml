profile: |
  ## Variant Profile: Enterprise (Agentic Enterprise Governance)

  This bundle is for governed, auditable delivery and production agent operation. Defaults:

  ```text
  - Methodology: enterprise-agent-governance (lifecycle DEFINE -> CONTRACT -> COMPOSE -> EVALUATE ->
    HARDEN -> APPROVE -> DEPLOY -> OPERATE -> CHANGE_OR_RETIRE; methodology.yaml operating_model).
  - Every production agent needs: accountable owner, governance policy, mission, behavior contract,
    autonomy policy, eval suite, audit log, interaction protocol (docs/governance/...).
  - Default execution mode: governed. Automatic escalation triggers always on; audit trail in
    .maestro/history/ + .maestro/observability/audit/.
  - Security/compliance advisories (security-auditor) are mandatory for externally exposed work.
  - Outward actions (deploy, data, identity) always user-approved; nothing silent.
  ```
