# Advisory artifact — output of a Specialist Advisor.
# Path: .maestro/work/tasks/<task-id>/advisories/<specialist-id>.yaml
# Contract: see .maestro/engine/rules/16-specialist-advisory-rules.md and 12-artifact-contracts.md

advisory_id: "{{TASK_ID}}-{{SPECIALIST_ID}}"
task_id: "{{TASK_ID}}"
specialist: "{{SPECIALIST_ID}}"          # e.g. security-auditor
category: "{{CATEGORY}}"                   # architecture | quality-security | product | data-ai | ops-devex | research-qa
created_at: "{{CREATED_AT}}"
created_by: "{{SPECIALIST_ID}}"
model_profile: "{{MODEL_PROFILE}}"

invoked_by: "{{INVOKING_AGENT}}"          # coordinator | task-analysis | solution-architect | coder-leader | dev-verification | qc-handoff
phase: "{{WORKFLOW_STATE}}"               # current state when the advisory runs (does not create a new state)

# Advisory decision — NOT the final gate decision (the gate belongs to the workflow agent).
decision: "recommendations"               # approved | recommendations | blocked
decision_reason: "{{REASON}}"
confidence: "medium"                      # low | medium | high

summary: "{{ONE_LINE_SUMMARY}}"

findings:
  - id: "F-1"
    severity: "high"                      # critical | high | medium | low | info
    title: "{{FINDING_TITLE}}"
    description: "{{DESCRIPTION}}"
    evidence:                             # evidence is required for critical/high (R-000-13)
      - "path/to/file.ext:42"
    recommendation: "{{RECOMMENDATION}}"
    references:                           # related skills, ADRs, docs
      - "skill: {{SKILL_NAME}}"
    blocking: false                       # true => recommend the workflow agent stop before proceeding

# Critical checks proposed for dev-verification / qc (if any)
proposed_critical_checks:
  - id: "{{CHECK_ID}}"
    description: "{{CHECK_DESC}}"
    reason: "{{WHY_CRITICAL}}"

# Items handed off to the downstream workflow agent
handoff:
  to: "{{DOWNSTREAM_AGENT}}"
  must_address: []                        # finding ids the downstream must resolve/acknowledge
  recommended: []

assumptions: []
unknowns: []                              # mark unknown instead of fabricating (Four Karpathy principles)
out_of_scope: []
