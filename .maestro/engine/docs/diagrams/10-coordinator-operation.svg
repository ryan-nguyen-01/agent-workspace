<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="980" viewBox="0 0 1900 980" role="img" aria-labelledby="title desc">
  <title id="title">Coordinator Operation Design</title>
  <desc id="desc">Coordinator-only orchestration design showing startup checks, policy gates, command routing, and recovery loops.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9ca3af"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#fca5a5"/></marker>
    <style>
      .bg{fill:#0f172a}
      .panel{fill:#172033;stroke:#334155;stroke-width:2;rx:16}
      .lane{fill:#0b1220;stroke:#334155;stroke-width:1.5;rx:12}
      .title{fill:#f8fafc;font:700 30px Arial}
      .subtitle{fill:#cbd5e1;font:500 15px Arial}
      .box{stroke-width:1.6;rx:10}
      .agent{fill:#1e3a5f;stroke:#60a5fa}
      .gate{fill:#78350f;stroke:#fbbf24}
      .memory{fill:#14532d;stroke:#86efac}
      .neutral{fill:#374151;stroke:#9ca3af}
      .stop{fill:#7f1d1d;stroke:#fca5a5}
      .text{fill:#f8fafc;font:700 14px Arial;text-anchor:middle;dominant-baseline:middle}
      .small{fill:#d1d5db;font:600 11px Arial;text-anchor:middle;dominant-baseline:middle}
      .laneTitle{fill:#e5e7eb;font:700 16px Arial}
      .edge{fill:none;stroke:#9ca3af;stroke-width:2.2;marker-end:url(#arrow)}
      .edge-red{fill:none;stroke:#fca5a5;stroke-width:2.2;marker-end:url(#arrow-red)}
      .label{fill:#e5e7eb;font:700 12px Arial}
      .label-red{fill:#fecaca;font:700 12px Arial}
      .badge{fill:#0b5d8c;stroke:#7dd3fc;stroke-width:1.3;rx:9}
      .yaml{fill:#e2e8f0;font:600 11px 'Courier New', monospace}
    </style>
  </defs>

  <rect class="bg" width="1900" height="980"/>
  <rect class="panel" x="24" y="24" width="1852" height="932"/>

  <text class="title" x="60" y="72">Coordinator Operation (Control Plane)</text>
  <text class="subtitle" x="60" y="102">Single entrypoint /coord orchestrates all agents via state, artifact, and approval gates</text>
  <rect class="badge" x="1520" y="46" width="310" height="36"/>
  <text class="small" x="1675" y="64">coordinator-only mode enabled</text>

  <!-- Top control flow -->
  <rect class="box neutral" x="70" y="130" width="180" height="74"/>
  <text class="text" x="160" y="157">User Request</text>
  <text class="small" x="160" y="181">raw prompt / ticket</text>

  <rect class="box agent" x="290" y="130" width="220" height="74"/>
  <text class="text" x="400" y="157">/coord Entrypoint</text>
  <text class="small" x="400" y="181">Coordinator receives all</text>

  <rect class="box memory" x="550" y="112" width="340" height="110"/>
  <text class="text" x="720" y="136">Startup Protocol</text>
  <text class="small" x="720" y="160">Read workflow.md + workflow-state.yaml</text>
  <text class="small" x="720" y="178">Read project-brain + agent-registry</text>
  <text class="small" x="720" y="196">Determine next allowed action</text>

  <rect class="box gate" x="930" y="100" width="390" height="134"/>
  <text class="text" x="1125" y="125">State Gate Checklist</text>
  <text class="small" x="1125" y="149">transition legal | artifact exists</text>
  <text class="small" x="1125" y="167">approval present | no blocker bug</text>
  <text class="small" x="1125" y="185">scope/policy constraints respected</text>

  <rect class="box gate" x="1360" y="130" width="240" height="74"/>
  <text class="text" x="1480" y="157">Policy Decision</text>
  <text class="small" x="1480" y="181">allow | deny | need approval</text>

  <rect class="box agent" x="1640" y="130" width="210" height="74"/>
  <text class="text" x="1745" y="157">Route by State</text>
  <text class="small" x="1745" y="181">choose next command</text>

  <rect class="box stop" x="1360" y="240" width="280" height="82"/>
  <text class="text" x="1500" y="265">Block Transition</text>
  <text class="small" x="1500" y="287">return missing artifact / approval</text>
  <text class="small" x="1500" y="305">ask user clarification</text>

  <path class="edge" d="M250 167H290"/>
  <path class="edge" d="M510 167H550"/>
  <path class="edge" d="M890 167H930"/>
  <path class="edge" d="M1320 167H1360"/>
  <path class="edge" d="M1600 167H1640"/>
  <path class="edge-red" d="M1480 204V240"/>
  <path class="edge-red" d="M1360 280C1240 300 1120 290 1030 234"/>
  <text class="label-red" x="1285" y="275">deny / needs_user_approval</text>

  <!-- Lane: bootstrap -->
  <rect class="lane" x="60" y="350" width="1780" height="160"/>
  <text class="laneTitle" x="85" y="382">Bootstrap Routing (when memory is missing or stale)</text>

  <rect class="box gate" x="100" y="405" width="220" height="70"/>
  <text class="text" x="210" y="432">Need Onboarding?</text>
  <text class="small" x="210" y="455">project brain stale/missing</text>

  <rect class="box agent" x="360" y="405" width="170" height="70"/>
  <text class="text" x="445" y="432">/onboard</text>
  <text class="small" x="445" y="455">build memory</text>

  <rect class="box gate" x="570" y="405" width="240" height="70"/>
  <text class="text" x="690" y="432">Create Coders?</text>
  <text class="small" x="690" y="455">requires user approval</text>

  <rect class="box agent" x="850" y="405" width="200" height="70"/>
  <text class="text" x="950" y="432">/create-coders</text>
  <text class="small" x="950" y="455">agent-factory</text>

  <rect class="box memory" x="1090" y="405" width="210" height="70"/>
  <text class="text" x="1195" y="432">AGENTS_READY</text>
  <text class="small" x="1195" y="455">registry active</text>

  <path class="edge" d="M1745 204C1745 320 260 330 210 405"/>
  <path class="edge" d="M320 440H360"/>
  <path class="edge" d="M530 440H570"/>
  <path class="edge" d="M810 440H850"/>
  <path class="edge" d="M1050 440H1090"/>

  <!-- Lane: development orchestration -->
  <rect class="lane" x="60" y="530" width="1780" height="170"/>
  <text class="laneTitle" x="85" y="562">Development Routing</text>

  <rect class="box agent" x="120" y="585" width="180" height="74"/>
  <text class="text" x="210" y="612">/analyze-task</text>
  <text class="small" x="210" y="636">task-analysis</text>

  <rect class="box agent" x="340" y="585" width="180" height="74"/>
  <text class="text" x="430" y="612">/plan-dev</text>
  <text class="small" x="430" y="636">coder-leader plan</text>

  <rect class="box agent" x="560" y="585" width="180" height="74"/>
  <text class="text" x="650" y="612">/dev</text>
  <text class="small" x="650" y="636">component coders</text>

  <rect class="box gate" x="780" y="585" width="200" height="74"/>
  <text class="text" x="880" y="612">/verify-dev</text>
  <text class="small" x="880" y="636">dev-verification gate</text>

  <rect class="box memory" x="1020" y="585" width="220" height="74"/>
  <text class="text" x="1130" y="612">DEV_DONE / QC_READY</text>
  <text class="small" x="1130" y="636">pass to QC handoff</text>

  <rect class="box stop" x="1020" y="622" width="220" height="74"/>
  <text class="text" x="1130" y="649">DEV_BLOCKED</text>
  <text class="small" x="1130" y="673">route back for fixes</text>

  <path class="edge" d="M300 622H340"/>
  <path class="edge" d="M520 622H560"/>
  <path class="edge" d="M740 622H780"/>
  <path class="edge" d="M980 610H1020"/>
  <path class="edge-red" d="M1120 696C1110 750 730 760 650 659"/>
  <text class="label-red" x="905" y="744">fix loop via coordinator</text>

  <path class="edge" d="M1745 204C1745 470 350 500 210 585"/>

  <!-- Lane: qc + bug + memory -->
  <rect class="lane" x="60" y="720" width="1780" height="200"/>
  <text class="laneTitle" x="85" y="752">QC and Closure Routing</text>

  <rect class="box agent" x="120" y="775" width="180" height="74"/>
  <text class="text" x="210" y="802">/handoff-qc</text>
  <text class="small" x="210" y="826">qc-handoff</text>

  <rect class="box agent" x="340" y="775" width="180" height="74"/>
  <text class="text" x="430" y="802">/qc</text>
  <text class="small" x="430" y="826">qc-runner</text>

  <rect class="box memory" x="560" y="775" width="180" height="74"/>
  <text class="text" x="650" y="802">QC_DONE</text>
  <text class="small" x="650" y="826">no open blockers</text>

  <rect class="box agent" x="780" y="775" width="200" height="74"/>
  <text class="text" x="880" y="802">/sync-memory</text>
  <text class="small" x="880" y="826">memory-update</text>

  <rect class="box memory" x="1020" y="775" width="170" height="74"/>
  <text class="text" x="1105" y="802">DONE</text>
  <text class="small" x="1105" y="826">workflow complete</text>

  <rect class="box stop" x="340" y="860" width="210" height="48"/>
  <text class="small" x="445" y="884">/bug route if defect from QC</text>

  <path class="edge" d="M300 812H340"/>
  <path class="edge" d="M520 812H560"/>
  <path class="edge" d="M740 812H780"/>
  <path class="edge" d="M980 812H1020"/>
  <path class="edge-red" d="M430 849V860"/>
  <path class="edge-red" d="M550 884C700 884 760 760 660 659"/>

  <path class="edge" d="M1130 585C1200 535 1280 430 1470 430"/>
  <rect class="box memory" x="1260" y="380" width="520" height="120"/>
  <text class="text" x="1520" y="406">State Persistence (Coordinator obligation)</text>
  <text class="small" x="1520" y="430">After each successful transition write .maestro/knowledge/workflow-state.yaml</text>
  <text class="yaml" x="1290" y="454">current_state: "&lt;NEW_STATE&gt;"</text>
  <text class="yaml" x="1290" y="470">updated_by: "coordinator"</text>
  <text class="yaml" x="1290" y="486">reason: "one-line transition reason"</text>

  <rect class="box neutral" x="1260" y="530" width="520" height="170"/>
  <text class="text" x="1520" y="556">Coordinator Output Contract</text>
  <text class="yaml" x="1290" y="582">state: "&lt;workflow-state&gt;"</text>
  <text class="yaml" x="1290" y="598">responsible_agent: "coordinator"</text>
  <text class="yaml" x="1290" y="614">next_command: "&lt;command&gt;"</text>
  <text class="yaml" x="1290" y="630">policy_decision: allow|deny|needs_user_approval</text>
  <text class="yaml" x="1290" y="646">missing_artifacts: []</text>
  <text class="yaml" x="1290" y="662">blocked: true|false</text>

  <text class="label" x="1708" y="357">audit + resume friendly</text>
</svg>
