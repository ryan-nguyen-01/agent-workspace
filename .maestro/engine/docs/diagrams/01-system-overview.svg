<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="1520" viewBox="0 0 1640 1520" role="img" aria-labelledby="title desc" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <title id="title">System overview</title>
  <desc id="desc">Comprehensive end-to-end workflow for the Coordinator-driven multi-agent platform.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#94a3b8"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#10B981"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#EF4444"/></marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#F59E0B"/></marker>
    <marker id="arrow-figma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#A259FF"/></marker>
    <style>
      .bg     { fill:#111827 }
      .panel  { fill:#1f2937; rx:16 }
      .phase  { fill:#0f172a; rx:12; stroke:#374151; stroke-width:1 }
      .box    { rx:10; stroke-width:1.5 }
      .text   { fill:#f8fafc; font-size:13px; text-anchor:middle; dominant-baseline:central }
      .text-s { fill:#cbd5e1; font-size:10.5px; text-anchor:middle; dominant-baseline:central }
      .title  { fill:#f9fafb; font-size:22px; font-weight:700; text-anchor:middle }
      .sub    { fill:#94a3b8; font-size:13px; text-anchor:middle }
      .label  { fill:#94a3b8; font-size:11px; font-weight:600; text-anchor:start; text-transform:uppercase; letter-spacing:1.5px }
      .edge   { stroke:#94a3b8; stroke-width:1.5; fill:none; marker-end:url(#arrow) }
      .edge-g { stroke:#10B981; stroke-width:1.5; fill:none; marker-end:url(#arrow-green) }
      .edge-r { stroke:#EF4444; stroke-width:1.5; fill:none; marker-end:url(#arrow-red); stroke-dasharray:6,3 }
      .edge-o { stroke:#F59E0B; stroke-width:1.5; fill:none; marker-end:url(#arrow-orange); stroke-dasharray:6,3 }
      .edge-f { stroke:#A259FF; stroke-width:1.5; fill:none; marker-end:url(#arrow-figma); stroke-dasharray:6,3 }
      .edge-label   { fill:#94a3b8; font-size:10px; text-anchor:middle; dominant-baseline:central }
      .edge-label-g { fill:#10B981; font-size:10px; text-anchor:middle; dominant-baseline:central; font-weight:600 }
      .edge-label-r { fill:#EF4444; font-size:10px; text-anchor:middle; dominant-baseline:central; font-weight:600 }
      .edge-label-o { fill:#F59E0B; font-size:10px; text-anchor:middle; dominant-baseline:central; font-weight:600 }
      .edge-label-f { fill:#A259FF; font-size:10px; text-anchor:middle; dominant-baseline:central; font-weight:600 }
      .diamond { stroke-width:1.5 }

      .blue   { fill:#1e3a5f; stroke:#3B82F6 }
      .green  { fill:#14532d; stroke:#10B981 }
      .orange { fill:#78350f; stroke:#F59E0B }
      .red    { fill:#7f1d1d; stroke:#EF4444 }
      .gray   { fill:#374151; stroke:#6B7280 }
      .purple { fill:#312e81; stroke:#818cf8 }
      .figma  { fill:#2d1654; stroke:#A259FF }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1640" height="1520"/>
  <rect class="panel" x="30" y="30" width="1580" height="1460"/>

  <!-- Title -->
  <text class="title" x="700" y="75">Maestro — System Overview</text>
  <text class="sub"   x="700" y="100">Coordinator-driven multi-agent workflow · end-to-end flow</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  PHASE 1 — ENTRY                              -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="125" width="1280" height="100"/>
  <text class="label" x="85" y="148">Entry</text>

  <rect class="blue box" x="200" y="155" width="160" height="48"/>
  <text class="text" x="280" y="179">User / Ticket</text>

  <path class="edge" d="M360 179 H510"/>

  <rect class="blue box" x="510" y="155" width="200" height="48"/>
  <text class="text" x="610" y="179">Coordinator</text>

  <path class="edge" d="M710 179 H890"/>
  <text class="edge-label" x="800" y="169">check knowledge</text>

  <!-- Brain check diamond -->
  <polygon class="orange diamond" points="990,179 1040,155 1090,179 1040,203"/>
  <text class="text" style="font-size:10px" x="1040" y="179">Knowledge?</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  PHASE 2 — BOOTSTRAP                          -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="245" width="1280" height="190"/>
  <text class="label" x="85" y="268">Bootstrap (first run / stale knowledge)</text>

  <!-- Knowledge exists -> skip to Task Analysis -->
  <path class="edge-g" d="M1040 203 V445 H250 V490"/>
  <text class="edge-label-g" x="1080" y="300">exists</text>

  <!-- Knowledge missing -> onboarding -->
  <path class="edge-r" d="M1090 179 H1160 V290 H1050"/>
  <text class="edge-label-r" x="1175" y="225">missing</text>

  <!-- Onboarding -->
  <rect class="blue box" x="860" y="272" width="190" height="48"/>
  <text class="text" x="955" y="296">Onboarding</text>

  <path class="edge" d="M860 296 H730"/>

  <!-- Agent Candidates -->
  <rect class="orange box" x="530" y="272" width="200" height="48"/>
  <text class="text" x="630" y="290">Agent Candidates</text>
  <text class="text-s" x="630" y="306">needs user approval</text>

  <path class="edge" d="M530 296 H415"/>

  <!-- Agent Factory -->
  <rect class="blue box" x="215" y="272" width="200" height="48"/>
  <text class="text" x="315" y="296">Agent Factory</text>

  <!-- Onboarding outputs → memory -->
  <path class="edge" d="M955 320 V370 H800"/>
  <rect class="green box" x="600" y="349" width="200" height="48"/>
  <text class="text" x="700" y="373">Project Brain</text>

  <rect class="green box" x="350" y="349" width="200" height="48"/>
  <text class="text" x="450" y="367">Component Registry</text>
  <text class="text-s" x="450" y="383">+ Test Policy</text>
  <path class="edge" d="M600 373 H550"/>

  <rect class="green box" x="100" y="349" width="200" height="48"/>
  <text class="text" x="200" y="373">Agent Registry</text>
  <path class="edge" d="M315 320 V373 H300"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  PHASE 3 — TASK ANALYSIS                      -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="455" width="1280" height="110"/>
  <text class="label" x="85" y="478">Task Analysis</text>

  <!-- Task Intake -->
  <rect class="blue box" x="150" y="490" width="200" height="48"/>
  <text class="text" x="250" y="514">Task Intake</text>

  <path class="edge" d="M350 514 H480"/>

  <rect class="orange box" x="480" y="490" width="200" height="48"/>
  <text class="text" x="580" y="508">Task Analysis</text>
  <text class="text-s" x="580" y="524">normalize · AC · risks</text>

  <path class="edge" d="M680 514 H830"/>

  <rect class="green box" x="830" y="490" width="240" height="48"/>
  <text class="text" x="950" y="508">task-analysis.yaml</text>
  <text class="text-s" x="950" y="524">intent · criteria · checks</text>

  <path class="edge" d="M1070 514 H1100"/>

  <rect class="orange box" x="1100" y="490" width="180" height="48"/>
  <text class="text" x="1190" y="508">User Approval</text>
  <text class="text-s" x="1190" y="524">review task spec</text>

  <!-- (exists path now connects directly from diamond to Task Intake) -->

  <!-- ══════════════════════════════════════════════ -->
  <!--  PHASE 4 — IMPLEMENTATION                     -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="585" width="1280" height="205"/>
  <text class="label" x="85" y="608">Implementation</text>

  <!-- Coder Leader -->
  <rect class="blue box" x="150" y="625" width="210" height="48"/>
  <text class="text" x="255" y="643">Coder Leader</text>
  <text class="text-s" x="255" y="659">plan · assign · integrate</text>

  <!-- User Approval → Coder Leader -->
  <path class="edge" d="M1190 538 V575 H255 V625"/>

  <!-- Service Coders -->
  <path class="edge" d="M360 649 H485"/>

  <rect class="blue box" x="485" y="620" width="160" height="48"/>
  <text class="text" x="565" y="644">Coder A</text>

  <rect class="blue box" x="485" y="680" width="160" height="48"/>
  <text class="text" x="565" y="704">Coder B</text>

  <rect class="blue box" x="485" y="740" width="160" height="48"/>
  <text class="text" x="565" y="764">Coder C</text>

  <path class="edge" d="M360 665 H440 V704 H485"/>
  <path class="edge" d="M360 665 H430 V764 H485"/>

  <text class="text-s" x="405" y="635">scoped writes</text>

  <!-- Coders → results merge -->
  <path class="edge" d="M645 644 H750"/>
  <path class="edge" d="M645 704 H720 V660 H750"/>
  <path class="edge" d="M645 764 H710 V676 H750"/>

  <rect class="gray box" x="750" y="630" width="200" height="48"/>
  <text class="text" x="850" y="648">coder-results.yaml</text>
  <text class="text-s" x="850" y="664">merge all outputs</text>

  <!-- implementation plan (side note) -->
  <rect class="green box" x="150" y="720" width="210" height="48"/>
  <text class="text" x="255" y="738">implementation-plan</text>
  <text class="text-s" x="255" y="754">.yaml + assignments</text>
  <path class="edge" d="M255 673 V720" style="stroke-dasharray:4,3"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  EXTERNAL — FIGMA MCP (optional)              -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="1360" y="455" width="210" height="335" rx="12" fill="none" stroke="#A259FF" stroke-width="1" stroke-dasharray="6,3"/>
  <text class="label" x="1375" y="478" style="fill:#A259FF">External MCPs</text>

  <rect class="figma box" x="1390" y="510" width="155" height="70"/>
  <text class="text" x="1467" y="533" style="font-size:12px">Figma MCP</text>
  <text class="text-s" x="1467" y="553">design · screenshot</text>

  <!-- Task Analysis ↔ Figma MCP -->
  <path class="edge-f" d="M1340 514 H1390"/>
  <text class="edge-label-f" x="1365" y="502">UI tasks</text>

  <!-- Service Coders ↔ Figma MCP (high tier) -->
  <path class="edge-f" d="M1340 700 H1467 V580"/>
  <text class="edge-label-f" x="1485" y="650">high tier</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  PHASE 5 — DEV VERIFICATION                   -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="805" width="1280" height="120"/>
  <text class="label" x="85" y="828">Dev Verification</text>

  <path class="edge" d="M850 678 V848 H620"/>
  <text class="edge-label" x="735" y="838">evaluate</text>

  <!-- Dev Verification Gate -->
  <rect class="orange box" x="400" y="838" width="220" height="52"/>
  <text class="text" x="510" y="856">Dev Verification Gate</text>
  <text class="text-s" x="510" y="875">critical checks · score ≥ 80%</text>

  <!-- Decision diamond -->
  <polygon class="orange diamond" points="280,864 330,840 380,864 330,888"/>
  <text class="text" style="font-size:10px" x="330" y="864">Pass?</text>
  <path class="edge" d="M400 864 H380"/>

  <!-- Not done → back to Coder Leader -->
  <path class="edge-r" d="M280 864 H180 V815 H100 V649 H150"/>
  <text class="edge-label-r" x="155" y="855">NOT DONE</text>
  <text class="edge-label-r" x="85" y="740">fix loop</text>

  <!-- Done → QC Handoff -->
  <path class="edge-g" d="M330 888 V975"/>
  <text class="edge-label-g" x="360" y="935">CODE DONE</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  PHASE 6 — QC                                 -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="940" width="1280" height="210"/>
  <text class="label" x="85" y="963">Quality Control</text>

  <!-- QC Handoff -->
  <rect class="purple box" x="230" y="975" width="200" height="48"/>
  <text class="text" x="330" y="993">QC Handoff</text>
  <text class="text-s" x="330" y="1009">qc-handoff.md</text>

  <path class="edge" d="M430 999 H530"/>

  <!-- QC Runner -->
  <rect class="purple box" x="530" y="975" width="200" height="48"/>
  <text class="text" x="630" y="993">QC Runner</text>
  <text class="text-s" x="630" y="1009">test from AC · risks</text>

  <path class="edge" d="M730 999 H930"/>

  <!-- QC outcome diamond -->
  <polygon class="orange diamond" points="930,999 990,970 1050,999 990,1028"/>
  <text class="text" style="font-size:10px" x="990" y="993">QC</text>
  <text class="text" style="font-size:10px" x="990" y="1007">Result?</text>

  <!-- QC Pass -->
  <path class="edge-g" d="M990 1028 V1160 H635 V1200"/>
  <text class="edge-label-g" x="990" y="1090">PASS</text>

  <!-- Blocking bug -->
  <path class="edge-r" d="M1050 999 H1170 V1080"/>
  <text class="edge-label-r" x="1130" y="985">BLOCKER</text>

  <rect class="red box" x="1095" y="1080" width="170" height="48"/>
  <text class="text" x="1180" y="1098">Bug Router</text>
  <text class="text-s" x="1180" y="1114">blocker → fix</text>

  <!-- Blocker loops back to Coder Leader -->
  <path class="edge-r" d="M1265 1104 H1310 V649 H360"/>
  <text class="edge-label-r" x="1300" y="860">fix loop</text>

  <!-- Non-blocking bug -->
  <path class="edge-o" d="M1050 999 H1100 V1104 H1050"/>
  <text class="edge-label-o" x="1120" y="1035">non-block</text>

  <rect class="orange box" x="860" y="1080" width="190" height="48"/>
  <text class="text" x="955" y="1098">Bug Task</text>
  <text class="text-s" x="955" y="1114">logged · QC continues</text>
  <path class="edge-o" d="M1095 1104 H1050"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--  PHASE 7 — COMPLETION                         -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="1170" width="1280" height="110"/>
  <text class="label" x="85" y="1193">Completion</text>

  <!-- Task Done -->
  <rect class="green box" x="520" y="1200" width="230" height="52"/>
  <text class="text" x="635" y="1218" style="font-size:15px;font-weight:600">✓ TASK DONE</text>
  <text class="text-s" x="635" y="1238">zero open blockers</text>

  <path class="edge" d="M750 1226 H780"/>

  <!-- QC Delivery Report -->
  <rect class="purple box" x="780" y="1200" width="200" height="52"/>
  <text class="text" x="880" y="1218">QC Delivery Report</text>
  <text class="text-s" x="880" y="1238">summary → user</text>

  <path class="edge" d="M980 1226 H1010"/>

  <!-- Memory Update -->
  <rect class="green box" x="1010" y="1200" width="220" height="52"/>
  <text class="text" x="1120" y="1218">Memory Update</text>
  <text class="text-s" x="1120" y="1238">brain · service · patterns</text>

  <!-- ══════════════════════════════════════════════ -->
  <!--  LEGEND                                        -->
  <!-- ══════════════════════════════════════════════ -->
  <rect class="phase" x="60" y="1300" width="1280" height="140"/>
  <text class="label" x="85" y="1323">Legend</text>

  <!-- Row 1 -->
  <rect class="blue box" x="100" y="1340" width="100" height="30"/>
  <text class="text" style="font-size:11px" x="150" y="1355">Agent</text>
  <text class="text-s" x="280" y="1355">Workflow agents</text>

  <rect class="green box" x="380" y="1340" width="100" height="30"/>
  <text class="text" style="font-size:11px" x="430" y="1355">Memory</text>
  <text class="text-s" x="555" y="1355">Brain · catalog · artifacts</text>

  <rect class="orange box" x="680" y="1340" width="100" height="30"/>
  <text class="text" style="font-size:11px" x="730" y="1355">Gate</text>
  <text class="text-s" x="850" y="1355">Decisions · verifications</text>

  <rect class="red box" x="980" y="1340" width="100" height="30"/>
  <text class="text" style="font-size:11px" x="1030" y="1355">Blocker</text>
  <text class="text-s" x="1150" y="1355">Stops QC, fix required</text>

  <!-- Row 2 -->
  <line x1="100" y1="1395" x2="200" y2="1395" class="edge" style="marker-end:url(#arrow)"/>
  <text class="text-s" x="270" y="1395">Normal flow</text>

  <line x1="380" y1="1395" x2="480" y2="1395" class="edge-g" style="marker-end:url(#arrow-green)"/>
  <text class="text-s" x="540" y="1395">Pass / success</text>

  <line x1="680" y1="1395" x2="780" y2="1395" class="edge-r" style="marker-end:url(#arrow-red)"/>
  <text class="text-s" x="845" y="1395">Fail / blocker loop</text>

  <line x1="980" y1="1395" x2="1080" y2="1395" class="edge-o" style="marker-end:url(#arrow-orange)"/>
  <text class="text-s" x="1155" y="1395">Non-blocking issue</text>

  <rect class="purple box" x="100" y="1415" width="100" height="22"/>
  <text class="text" style="font-size:11px" x="150" y="1426">QC</text>
  <text class="text-s" x="270" y="1426">QC suite agents</text>

  <polygon class="orange diamond" points="430,1426 455,1412 480,1426 455,1440"/>
  <text class="text-s" x="540" y="1426">Decision point</text>

  <rect class="figma box" x="680" y="1415" width="100" height="22"/>
  <text class="text" style="font-size:11px" x="730" y="1426">External</text>
  <text class="text-s" x="850" y="1426">Figma MCP · optional</text>
</svg>
