<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-labelledby="title desc">
  <title id="title">Folder structure</title>
  <desc id="desc">Visual map of the maestro folders showing framework spec, runtime data, and tool adapters.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9ca3af"/></marker>
    <style>
      .bg{fill:#111827}.panel{fill:#172033;stroke:#374151;stroke-width:2;rx:18}.title{fill:#f9fafb;font:700 28px Arial}.subtitle{fill:#cbd5e1;font:400 15px Arial}.box{stroke-width:1.5;rx:10}.agent{fill:#1e3a5f;stroke:#60a5fa}.memory{fill:#14532d;stroke:#86efac}.gate{fill:#78350f;stroke:#fbbf24}.neutral{fill:#374151;stroke:#9ca3af}.stop{fill:#7f1d1d;stroke:#fca5a5}.text{fill:#f8fafc;font:700 15px Arial;text-anchor:middle;dominant-baseline:middle}.small{fill:#d1d5db;font:600 12px Arial;text-anchor:middle;dominant-baseline:middle}.edge{fill:none;stroke:#9ca3af;stroke-width:2;marker-end:url(#arrow)}.lane{fill:#0f172a;stroke:#334155;stroke-width:1.5;rx:14}.laneText{fill:#e5e7eb;font:700 17px Arial}.label{fill:#e5e7eb;font:700 13px Arial}
    </style>
  </defs>
  <rect class="bg" width="1500" height="820"/>
  <rect class="panel" x="30" y="30" width="1440" height="760"/>
  <text class="title" x="70" y="78">maestro Folder Structure</text>
  <text class="subtitle" x="70" y="108">.maestro control plane + product roots + tool adapters</text>

  <!-- Layer 1: Definitions -->
  <rect class="lane" x="60" y="140" width="680" height="280"/>
  <text class="laneText" x="90" y="175">.maestro/engine framework source (tool-neutral)</text>

  <rect class="box agent" x="90" y="200" width="150" height="55"/><text class="text" x="165" y="227">workflow.md</text>
  <text class="small" x="165" y="275">authoritative</text>
  <text class="small" x="165" y="293">state machine</text>

  <rect class="box agent" x="260" y="200" width="150" height="55"/><text class="text" x="335" y="227">docs/</text>
  <text class="small" x="335" y="275">guides</text>
  <text class="small" x="335" y="293">+ diagrams</text>

  <rect class="box gate" x="430" y="200" width="150" height="55"/><text class="text" x="505" y="227">rules/</text>
  <text class="small" x="505" y="275">23 workflow rules</text>
  <text class="small" x="505" y="293">policy constraints</text>

  <rect class="box neutral" x="90" y="325" width="150" height="55"/><text class="text" x="165" y="352">templates/</text>
  <text class="small" x="165" y="395">51 artifact templates</text>

  <rect class="box neutral" x="260" y="325" width="150" height="55"/><text class="text" x="335" y="352">README.md</text>
  <text class="small" x="335" y="395">spec entrypoint</text>

  <rect class="box neutral" x="430" y="325" width="150" height="55"/><text class="text" x="505" y="352">changelog</text>
  <text class="small" x="505" y="395">framework history</text>

  <!-- Layer 2: Runtime -->
  <rect class="lane" x="760" y="140" width="700" height="280"/>
  <text class="laneText" x="790" y="175">.maestro knowledge, work, memory, and local runtime</text>

  <rect class="box memory" x="790" y="200" width="195" height="55"/><text class="text" x="887" y="220">project-brain</text><text class="small" x="887" y="240">.yaml</text>
  <text class="small" x="887" y="275">project memory</text>

  <rect class="box memory" x="1005" y="200" width="195" height="55"/><text class="text" x="1102" y="220">components</text><text class="small" x="1102" y="240">.yaml</text>
  <text class="small" x="1102" y="275">component paths</text>

  <rect class="box memory" x="1220" y="200" width="195" height="55"/><text class="text" x="1317" y="220">agent-registry</text><text class="small" x="1317" y="240">.yaml</text>
  <text class="small" x="1317" y="275">coder scopes</text>

  <rect class="box memory" x="790" y="325" width="195" height="55"/><text class="text" x="887" y="345">test-policy</text><text class="small" x="887" y="365">.yaml</text>
  <text class="small" x="887" y="395">test requirements</text>

  <rect class="box memory" x="1005" y="325" width="195" height="55"/><text class="text" x="1102" y="352">context/services</text>
  <text class="small" x="1102" y="395">component knowledge</text>

  <rect class="box memory" x="1220" y="325" width="195" height="55"/><text class="text" x="1317" y="352">feedback/</text>
  <text class="small" x="1317" y="395">patterns + anti-patterns</text>

  <!-- Layer 3: Task artifacts -->
  <rect class="lane" x="60" y="445" width="680" height="320"/>
  <text class="laneText" x="90" y="480">Task artifacts (per task lifecycle)</text>

  <rect class="box neutral" x="90" y="505" width="185" height="55"/><text class="text" x="182" y="525">task-input.md</text><text class="small" x="182" y="545">+ task.yaml</text>
  <rect class="box agent" x="295" y="505" width="185" height="55"/><text class="text" x="387" y="525">task-analysis</text><text class="small" x="387" y="545">.yaml</text>
  <rect class="box agent" x="500" y="505" width="185" height="55"/><text class="text" x="592" y="525">impl-plan</text><text class="small" x="592" y="545">.yaml</text>

  <rect class="box agent" x="90" y="590" width="185" height="55"/><text class="text" x="182" y="610">coder-results</text><text class="small" x="182" y="630">.yaml</text>
  <rect class="box gate" x="295" y="590" width="185" height="55"/><text class="text" x="387" y="610">dev-verification</text><text class="small" x="387" y="630">.yaml</text>
  <rect class="box agent" x="500" y="590" width="185" height="55"/><text class="text" x="592" y="610">qc-handoff</text><text class="small" x="592" y="630">.md</text>

  <rect class="box agent" x="90" y="675" width="185" height="55"/><text class="text" x="182" y="695">qc-test-results</text><text class="small" x="182" y="715">.yaml</text>
  <rect class="box stop" x="295" y="675" width="185" height="55"/><text class="text" x="387" y="702">bugs.yaml</text>
  <rect class="box memory" x="500" y="675" width="185" height="55"/><text class="text" x="592" y="695">memory-updates</text><text class="small" x="592" y="715">.yaml</text>

  <!-- Layer 4: Bug tracking -->
  <rect class="lane" x="760" y="445" width="700" height="320"/>
  <text class="laneText" x="790" y="480">Bug tracking + root files</text>

  <rect class="box stop" x="790" y="505" width="195" height="55"/><text class="text" x="887" y="525">bugs/blockers/</text><text class="small" x="887" y="545">stop QC</text>
  <rect class="box gate" x="1005" y="505" width="195" height="55"/><text class="text" x="1102" y="525">bugs/non-</text><text class="small" x="1102" y="545">blockers/</text>

  <rect class="box neutral" x="790" y="610" width="195" height="55"/><text class="text" x="887" y="630">CLAUDE.md</text><text class="small" x="887" y="660">agent entry point</text>
  <rect class="box neutral" x="1005" y="610" width="195" height="55"/><text class="text" x="1102" y="630">workflow.md</text><text class="small" x="1102" y="660">state machine</text>
  <rect class="box neutral" x="1220" y="610" width="195" height="55"/><text class="text" x="1317" y="630">changelog.md</text><text class="small" x="1317" y="660">history</text>

  <!-- Flow arrows -->
  <path class="edge" d="M185 255H260"/>
  <path class="edge" d="M355 255H430"/>
  <path class="edge" d="M277 505H295"/>
  <path class="edge" d="M482 532H500"/>
  <path class="edge" d="M277 617H295"/>
  <path class="edge" d="M482 617H500"/>
  <path class="edge" d="M277 702H295"/>
  <path class="edge" d="M482 702H500"/>
</svg>
