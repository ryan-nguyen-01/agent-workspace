<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" role="img" aria-labelledby="title desc">
  <title id="title">Deep onboarding flow</title>
  <desc id="desc">Deep onboarding scan categories and output destinations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9ca3af"/></marker>
    <style>
      .bg{fill:#111827}.panel{fill:#172033;stroke:#374151;stroke-width:2;rx:18}.title{fill:#f9fafb;font:700 26px Arial}.subtitle{fill:#cbd5e1;font:400 14px Arial}.box{stroke-width:1.5;rx:10}.agent{fill:#1e3a5f;stroke:#60a5fa}.memory{fill:#14532d;stroke:#86efac}.gate{fill:#78350f;stroke:#fbbf24}.neutral{fill:#374151;stroke:#9ca3af}.text{fill:#f8fafc;font:700 15px Arial;text-anchor:middle;dominant-baseline:middle}.small{fill:#d1d5db;font:600 12px Arial;text-anchor:middle;dominant-baseline:middle}.edge{fill:none;stroke:#9ca3af;stroke-width:2;marker-end:url(#arrow)}.lane{fill:#0f172a;stroke:#334155;stroke-width:1.5;rx:14}.laneText{fill:#e5e7eb;font:700 17px Arial}.label{fill:#e5e7eb;font:700 13px Arial}
    </style>
  </defs>
  <rect class="bg" width="1500" height="720"/>
  <rect class="panel" x="30" y="30" width="1440" height="660"/>
  <text class="title" x="70" y="78">Deep Onboarding: Scan Categories and Outputs</text>
  <text class="subtitle" x="70" y="108">Extract reusable knowledge before generating coder agents. Every item carries evidence paths and confidence.</text>

  <!-- Scan categories -->
  <rect class="lane" x="60" y="140" width="430" height="520"/>
  <text class="laneText" x="90" y="175">Scan categories</text>

  <rect class="box agent" x="90" y="200" width="180" height="55"/><text class="text" x="180" y="220">Reusable Assets</text>
  <text class="small" x="180" y="275">utilities, hooks, base classes</text>
  <text class="small" x="180" y="293">middleware, validators, helpers</text>
  <text class="small" x="180" y="311">API clients, repo abstractions</text>

  <rect class="box agent" x="290" y="200" width="180" height="55"/><text class="text" x="380" y="220">Coding Flow</text>
  <text class="small" x="380" y="275">request lifecycle</text>
  <text class="small" x="380" y="293">data access, transactions</text>
  <text class="small" x="380" y="311">error/logging/config flow</text>

  <rect class="box agent" x="90" y="345" width="180" height="55"/><text class="text" x="180" y="365">Business Flows</text>
  <text class="small" x="180" y="420">auth, payments, orders</text>
  <text class="small" x="180" y="438">notifications, admin ops</text>
  <text class="small" x="180" y="456">background jobs, sync</text>

  <rect class="box gate" x="290" y="345" width="180" height="55"/><text class="text" x="380" y="365">Conventions</text>
  <text class="small" x="380" y="420">naming, structure, patterns</text>
  <text class="small" x="380" y="438">anti-patterns to avoid</text>
  <text class="small" x="380" y="456">proven by evidence only</text>

  <rect class="box neutral" x="90" y="490" width="380" height="55"/><text class="text" x="280" y="510">Evidence Standard</text>
  <text class="small" x="280" y="558">name + path + purpose + when to reuse</text>
  <text class="small" x="280" y="576">used by + evidence paths + confidence (low/med/high)</text>

  <!-- Structured outputs -->
  <rect class="lane" x="520" y="140" width="450" height="520"/>
  <text class="laneText" x="550" y="175">Structured outputs</text>

  <rect class="box memory" x="550" y="210" width="200" height="55"/><text class="text" x="650" y="230">project.yaml</text><text class="small" x="650" y="248">deep_project_intelligence</text>
  <rect class="box memory" x="550" y="295" width="200" height="55"/><text class="text" x="650" y="315">components/*.yaml</text><text class="small" x="650" y="333">component_deep_intelligence</text>
  <rect class="box memory" x="550" y="380" width="200" height="55"/><text class="text" x="650" y="400">task-analysis.yaml</text><text class="small" x="650" y="418">reuse_convention_analysis</text>
  <rect class="box memory" x="550" y="465" width="200" height="55"/><text class="text" x="650" y="485">dev-verification.yaml</text><text class="small" x="650" y="503">reuse_convention_check</text>
  <rect class="box memory" x="550" y="550" width="200" height="55"/><text class="text" x="650" y="570">memory-updates.yaml</text><text class="small" x="650" y="588">reuse_convention_updates</text>

  <!-- Human readable outputs -->
  <rect class="lane" x="1000" y="140" width="430" height="520"/>
  <text class="laneText" x="1030" y="175">Human-readable outputs</text>

  <rect class="box memory" x="1030" y="210" width="200" height="55"/><text class="text" x="1130" y="230">generics.md</text><text class="small" x="1130" y="248">common/shared assets</text>
  <rect class="box memory" x="1250" y="210" width="160" height="55"/><text class="text" x="1330" y="237">conventions.md</text>
  <rect class="box memory" x="1030" y="295" width="200" height="55"/><text class="text" x="1130" y="322">architecture.md</text>

  <!-- Enforcement gate -->
  <rect class="box gate" x="1030" y="420" width="380" height="70"/><text class="text" x="1220" y="448">Coder Enforcement Gate</text>
  <text class="small" x="1220" y="472">coders must check assets + conventions before coding</text>

  <!-- Verification gate -->
  <rect class="box gate" x="1030" y="530" width="380" height="70"/><text class="text" x="1220" y="558">Dev Verification Gate</text>
  <text class="small" x="1220" y="582">block if: reusable ignored, duplicated, conventions violated</text>

  <!-- Arrows -->
  <path class="edge" d="M270 227H290"/>
  <path class="edge" d="M270 372H290"/>
  <path class="edge" d="M470 227H550"/>
  <path class="edge" d="M470 372H550"/>
  <path class="edge" d="M470 517H550"/>
  <path class="edge" d="M750 237H1030"/>
  <path class="edge" d="M750 322H1030"/>
  <path class="edge" d="M1130 350V420"/>
  <path class="edge" d="M1220 490V530"/>
</svg>
