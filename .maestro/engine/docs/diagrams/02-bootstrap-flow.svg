<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="620" viewBox="0 0 1500 620" role="img" aria-labelledby="title desc">
  <title id="title">Bootstrap flow</title>
  <desc id="desc">Onboarding and coder-agent generation flow.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9ca3af"/></marker>
    <style>
      .bg{fill:#111827}.panel{fill:#172033;stroke:#374151;stroke-width:2;rx:18}.title{fill:#f9fafb;font:700 26px Arial}.box{stroke-width:1.5;rx:10}.agent{fill:#1e3a5f;stroke:#60a5fa}.memory{fill:#14532d;stroke:#86efac}.gate{fill:#78350f;stroke:#fbbf24}.neutral{fill:#374151;stroke:#9ca3af}.text{fill:#f8fafc;font:700 15px Arial;text-anchor:middle;dominant-baseline:middle}.small{fill:#d1d5db;font:600 12px Arial;text-anchor:middle;dominant-baseline:middle}.edge{fill:none;stroke:#9ca3af;stroke-width:2.2;marker-end:url(#arrow)}.label{fill:#e5e7eb;font:700 13px Arial}
    </style>
  </defs>
  <rect class="bg" width="1500" height="620"/>
  <rect class="panel" x="30" y="30" width="1440" height="560"/>
  <text class="title" x="70" y="78">Bootstrap: Onboarding and Generated Coder Agents</text>

  <rect class="box neutral" x="70" y="250" width="150" height="70"/><text class="text" x="145" y="285">User</text>
  <rect class="box agent" x="270" y="250" width="180" height="70"/><text class="text" x="360" y="285">Coordinator</text>
  <rect class="box gate" x="500" y="250" width="210" height="70"/><text class="text" x="605" y="278">Project Brain</text><text class="small" x="605" y="302">Check</text>
  <rect class="box agent" x="760" y="115" width="210" height="70"/><text class="text" x="865" y="150">Onboarding Agent</text>
  <rect class="box memory" x="1020" y="70" width="210" height="70"/><text class="text" x="1125" y="105">Project Brain</text>
  <rect class="box memory" x="1020" y="170" width="210" height="70"/><text class="text" x="1125" y="205">Component Registry</text>
  <rect class="box memory" x="1020" y="270" width="210" height="70"/><text class="text" x="1125" y="305">Test Policy</text>
  <rect class="box memory" x="1020" y="370" width="210" height="70"/><text class="text" x="1125" y="405">Agent Candidates</text>
  <rect class="box gate" x="760" y="470" width="210" height="70"/><text class="text" x="865" y="496">Ask user</text><text class="small" x="865" y="520">Create coders?</text>
  <rect class="box agent" x="1020" y="470" width="210" height="70"/><text class="text" x="1125" y="505">Agent Factory</text>
  <rect class="box memory" x="1280" y="470" width="170" height="70"/><text class="text" x="1365" y="496">Agent</text><text class="small" x="1365" y="520">Registry</text>

  <path class="edge" d="M220 285H270"/>
  <path class="edge" d="M450 285H500"/>
  <path class="edge" d="M710 270C735 225 755 190 760 150"/>
  <text class="label" x="720" y="215">missing / stale</text>
  <path class="edge" d="M970 150C995 120 1005 110 1020 105"/>
  <path class="edge" d="M970 150C1000 170 1000 190 1020 205"/>
  <path class="edge" d="M970 150C1005 220 1005 280 1020 305"/>
  <path class="edge" d="M970 150C1010 290 1005 385 1020 405"/>
  <path class="edge" d="M1125 440V470"/>
  <path class="edge" d="M970 505H1020"/>
  <path class="edge" d="M1230 505H1280"/>
  <path class="edge" d="M710 300C785 405 790 465 760 505"/>
  <text class="label" x="730" y="370">brain exists but no active coders</text>
</svg>
