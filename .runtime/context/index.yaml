version: 1
generated_at: "2026-05-17"
generated_by: "memory-structure-migration"
memory_epoch: 1
memory_root: ".runtime/context"

purpose: "Small routing index so agents can decide which memory files to open without rereading the whole brain."

read_policy:
  startup:
    - ".agent/workflow.md"
    - ".runtime/context/workflow-state.yaml"
    - ".runtime/context/index.yaml"
  then_read_only_if_relevant:
    - ".runtime/context/project-brain.yaml"
    - ".runtime/context/summary.md"
    - ".runtime/context/architecture.md"
    - ".runtime/context/conventions.md"
    - ".runtime/context/common/generics.md"
    - ".runtime/context/services/<service>.yaml"
    - ".runtime/context/feedback/*.md"
    - ".runtime/context/inputs-index.yaml"
  service_control_files:
    - ".runtime/context/service-catalog.yaml"
    - ".runtime/context/agent-registry.yaml"
    - ".runtime/context/test-policy.yaml"
    - ".runtime/context/skill-registry.yaml"
    - ".runtime/context/model-routing.yaml"
    - ".runtime/context/agent-activity.yaml"
    - ".runtime/context/response-ui.yaml"
  skills_policy:
    registry: ".runtime/context/skill-registry.yaml"
    rule: "Do not scan or read all of .claude/skills/**. Select candidates from the registry first, then open only selected SKILL.md files and direct references."
  user_inputs_root: "inputs"
  user_inputs_index: ".runtime/context/inputs-index.yaml"
  rule: "Do not open every file under memory by default. Use task intent, impacted services, and this index first. For user-provided reference docs (PRD/HLD/ADR/OpenAPI/glossary), open inputs-index.yaml first then read only relevant files under inputs/."

context_economy:
  project_profile_source: ".runtime/context/project-brain.yaml.project_profile"
  default_budget_files:
    coordinator: 4
    task_analysis: 12
    coder_leader: 16
    service_coder: 20
    verification: 12
  universal_project_archetypes:
    - backend-api
    - frontend-web
    - mobile-app
    - desktop-app
    - cli-tool
    - library-sdk
    - data-pipeline
    - ml-model
    - infra-iac
    - embedded-firmware
    - docs-site
    - docs-and-templates
    - plugin-extension
    - monorepo-platform
    - workflow-framework
  signature_scan_first:
    rule: "Before broad source reads, inspect file tree, manifests, lockfiles, build/test config, route/API/schema files, and service-catalog paths."
    skip_by_default:
      - "node_modules"
      - "vendor"
      - "dist"
      - "build"
      - ".next"
      - "coverage"
      - ".git"
      - "large generated files"
  task_context_plan:
    artifact: ".runtime/tasks/<task-id>/task-analysis.yaml.context_plan"
    rule: "Coder Leader and service coders read the context_plan first, then expand only when listed triggers fire."

commands:
  initial_fetch: "/onboard <service-path-or-repo-root>"
  refresh_by_rescan: "/sync-memory --scan --services <service-ids>"
  refresh_by_files: "/sync-memory --files <paths> --services <service-ids>"
  refresh_index_only: "/sync-memory --refresh-index"
  partial_service_refresh: "/onboard --refresh <service-id-or-path>"
  skill_maintenance: "/skills status|audit|update|refresh-registry"
  policy_snapshot_check: "/policy-check snapshot --root <workspace-or-snapshot>"
  workspace_mode_repair: "/workspace-mode repair"
  activity_status: "/status"
  activity_status_cli: "python3 scripts/status-dashboard.py --mode models"
  activity_start_cli: "python3 scripts/agent-activity.py start --agent-id <agent> --phase <phase> --current-action <summary>"
  activity_heartbeat_cli: "python3 scripts/agent-activity.py heartbeat --agent-id <agent> --current-action <summary>"
  activity_complete_cli: "python3 scripts/agent-activity.py complete --agent-id <agent> --summary <summary>"
  response_ui_cli: "python3 scripts/status-dashboard.py --mode <compact|concise|dashboard|models|json>"
  status_artifacts_cli: "python3 scripts/status-dashboard.py --mode dashboard --write"
  architecture_health_cli: "python3 scripts/architecture-health-check.py --strict"
  architecture_health_report_cli: "python3 scripts/architecture-health-check.py --strict --write-report"

policy_context:
  owner: "workflow-policy"
  goal: "Fast, deterministic policy checks without external runtimes."
  optional_deterministic_helper: "scripts/architecture-health-check.py is allowed for CI/local drift checks, but workflow-policy must not depend on it."
  no_runtime_dependencies:
    - "python"
    - "node"
    - "jq"
    - "shell helper scripts"
  check_types:
    transition:
      read:
        - ".runtime/context/workflow-state.yaml"
        - ".agent/workflow.md"
        - ".agent/rules/11-approval-gates.md"
        - ".agent/rules/12-artifact-contracts.md"
    workspace:
      read:
        - ".runtime/context/workflow-state.yaml"
        - ".runtime/context/project-brain.yaml"
        - ".runtime/context/service-catalog.yaml"
        - ".runtime/context/agent-registry.yaml"
        - ".runtime/context/model-routing.yaml"
        - ".runtime/context/agent-activity.yaml"
        - ".runtime/context/response-ui.yaml"
    snapshot:
      read:
        - "<root>/.runtime/context/workflow-state.yaml"
        - "<root>/.runtime/context/project-brain.yaml"
        - "<root>/.runtime/context/service-catalog.yaml"
        - "<root>/.runtime/context/agent-registry.yaml"
        - "<root>/.runtime/context/model-routing.yaml"
        - "<root>/.runtime/context/agent-activity.yaml"
        - "<root>/.runtime/context/response-ui.yaml"
        - "<root>/.runtime/tasks/<active-or-parallel-task-id>/task.yaml"
        - "<root>/.runtime/tasks/<active-or-parallel-task-id>/task-updates.yaml"
        - "<root>/.runtime/tasks/<active-or-parallel-task-id>/task-analysis.yaml"
      rule: "If <root>/services is absent or empty, set services_available=false and validate recorded artifacts only."
    task:
      read:
        - ".runtime/tasks/<task-id>/task.yaml"
        - ".runtime/tasks/<task-id>/task-updates.yaml"
        - ".runtime/tasks/<task-id>/task-analysis.yaml"
        - ".runtime/tasks/<task-id>/service-assignments.yaml"
        - ".runtime/tasks/<task-id>/coder-results.yaml"
        - ".runtime/tasks/<task-id>/dev-verification.yaml"
        - ".runtime/tasks/<task-id>/qc-test-results.yaml"
      rule: "Open only artifacts required by task state and task.yaml manifest."
  output_template: ".agent/templates/policy-check-report.template.yaml"

documents:
  - path: ".runtime/context/project-brain.yaml"
    role: "project_brain"
    scope: "project"
    tags: ["architecture", "policies", "memory-rules", "workflow"]
    service_ids: []
    read_when: ["routing", "onboarding", "planning", "memory-update"]
  - path: ".runtime/context/summary.md"
    role: "human_summary"
    scope: "project"
    tags: ["summary"]
    service_ids: []
    read_when: ["quick-orientation", "status"]
  - path: ".runtime/context/model-routing.yaml"
    role: "model_routing_policy"
    scope: "project"
    tags: ["models", "routing", "cost", "observability"]
    service_ids: []
    read_when: ["routing", "status", "agent-dispatch", "policy-check"]
  - path: ".runtime/context/agent-activity.yaml"
    role: "agent_activity_dashboard"
    scope: "project"
    tags: ["status", "telemetry", "tokens", "cost", "activity"]
    service_ids: []
    read_when: ["status", "routing", "handoff", "long-running-work"]
  - path: ".runtime/context/response-ui.yaml"
    role: "response_ui_contract"
    scope: "project"
    tags: ["status", "responses", "ui", "format", "tool-entrypoints"]
    service_ids: []
    read_when: ["status", "final-response", "review", "tool-entrypoint-sync"]
  - path: ".runtime/status.md"
    role: "generated_status_artifact"
    scope: "project"
    tags: ["status", "dashboard", "generated"]
    service_ids: []
    read_when: ["status", "human-dashboard"]
  - path: ".runtime/status.html"
    role: "generated_status_dashboard"
    scope: "project"
    tags: ["status", "dashboard", "generated", "html"]
    service_ids: []
    read_when: ["status", "human-dashboard"]
  - path: ".runtime/architecture-health-report.json"
    role: "generated_architecture_health_report"
    scope: "project"
    tags: ["health", "drift", "generated", "ci"]
    service_ids: []
    read_when: ["policy-check", "framework-maintenance", "release-readiness"]
  - path: ".runtime/architecture-health-report.md"
    role: "generated_architecture_health_summary"
    scope: "project"
    tags: ["health", "drift", "generated", "human-summary"]
    service_ids: []
    read_when: ["policy-check", "framework-maintenance", "release-readiness"]
  - path: ".runtime/context/architecture.md"
    role: "architecture_notes"
    scope: "project"
    tags: ["architecture", "flows"]
    service_ids: []
    read_when: ["task-analysis", "architecture-review", "planning", "cross-service-impact"]
  - path: ".runtime/context/conventions.md"
    role: "coding_conventions"
    scope: "project"
    tags: ["conventions", "style", "reuse"]
    service_ids: []
    read_when: ["planning", "coding", "review"]
  - path: ".runtime/context/common/generics.md"
    role: "reusable_asset_index"
    scope: "project"
    tags: ["reuse", "shared-assets"]
    service_ids: []
    read_when: ["before-creating-helper", "coding", "review"]
  - path: ".runtime/context/environments.md"
    role: "environment_notes"
    scope: "project"
    tags: ["environment", "verification", "qc"]
    service_ids: []
    read_when: ["dev-verification", "qc"]
  - path: ".runtime/context/feedback/patterns.md"
    role: "positive_feedback_patterns"
    scope: "project"
    tags: ["feedback", "patterns", "docs", "language", "style-guide"]
    service_ids: []
    read_when: ["task-analysis", "planning", "coding", "dev-verification", "bug-routing", "memory-update", "docs-update", "response-writing"]
  - path: ".runtime/context/feedback/anti-patterns.md"
    role: "negative_feedback_patterns"
    scope: "project"
    tags: ["feedback", "anti-patterns", "docs", "language"]
    service_ids: []
    read_when: ["task-analysis", "planning", "coding", "dev-verification", "bug-routing", "memory-update", "docs-update", "response-writing"]

service_memory:
  directory: ".runtime/context/services"
  pattern: ".runtime/context/services/<service>.yaml"
  read_when:
    - "Task impacts that service."
    - "Coder Leader assigns that service."
    - "Agent Factory creates or updates that service coder."

service_control:
  catalog: ".runtime/context/service-catalog.yaml"
  agent_registry: ".runtime/context/agent-registry.yaml"
  test_policy: ".runtime/context/test-policy.yaml"
  skill_registry: ".runtime/context/skill-registry.yaml"
  rule: "Use these files to find where coding is allowed; do not treat them as durable project brain."

staleness:
  stale_if:
    - "project-brain.yaml freshness.stale is true."
    - "memory_epoch differs between index.yaml and project-brain.yaml."
    - "A service path changed but .runtime/context/service-catalog.yaml was not updated."
    - "A durable decision was made but /sync-memory was not run."
  recovery:
    - "Run /sync-memory --changed <paths> for known changes."
    - "Run /onboard --refresh <service> when service boundaries, stack, or tests changed."
