version: 1
updated_at: "2026-04-17"
purpose: "Machine-readable skill selection registry for Agent Factory and Coder Leader."
status: "manual_registry_ready"
docs_reference: ".agent/docs/external-skills.md"
# NOTE: This file is the canonical source for runtime skill selection.
# For install history, sources, and security audit → see docs_reference above.

selection_policy:
  default_attach_all_installed_skills: false
  prefer_minimum_useful_set: true
  project_evidence_required: true
  task_evidence_required_for_contextual_skills: true
  risky_skill_requires_approval: true
  unavailable_skill_must_not_be_attached: true
  docs_reference: ".agent/docs/external-skills.md"

risk_levels:
  low:
    attach_policy: "May attach when project/task evidence matches."
  medium:
    attach_policy: "Attach only when evidence is clear; record reason in generated coder."
  high:
    attach_policy: "Do not attach by default; require explicit reason and Coordinator approval for sensitive work."
  critical:
    attach_policy: "Restricted reference only unless user explicitly approves."

core_workflow_skills:
  required_for_every_generated_coder:
    - skill-project-brain
    - skill-service-coder
    - skill-dev-verification
    - skill-memory-update
    - skill-workflow-policy
  coordination_when_needed:
    - skill-coder-leader
    - skill-task-analysis
    - skill-qc-handoff
    - skill-bug-routing

