schema_version: "1.0"
hierarchy:
  levels:
    - "initiative"
    - "epic"
    - "task"
    - "subtask"
  max_depth: 4
  rule: "A subtask that still requires decomposition becomes a task; do not nest subtasks."

decomposition:
  required_when:
    - "more_than_one_session"
    - "multiple_independent_acceptance_criteria"
    - "design_and_implementation"
    - "multiple_components"
    - "parallel_workstreams"
    - "migration_or_rollout"
    - "multiple_specialists"
  outputs:
    - "plan.yaml"
    - "dependency-graph.yaml"
    - "progress.yaml"

runs:
  index: ".maestro/work/runs/index.yaml"
  rule: "A task may have zero or more runs; create runs for resumable, multi-agent, eval-driven, or human-in-the-loop execution."

active:
  initiative_ids: []
  epic_ids: []
  task_ids: []
  run_ids: []

completed:
  task_ids: []
