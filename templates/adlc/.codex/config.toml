# Codex CLI project-level configuration for maestro.
# Schema verified against https://developers.openai.com/codex/config-reference.
#
# IMPORTANT: project-level config (.codex/config.toml) is loaded ONLY when the
# project is trusted. To trust this workspace, run codex inside this directory
# and accept the trust prompt, OR add this in your ~/.codex/config.toml:
#
#   [projects."/absolute/path/to/this/workspace"]
#   trust_level = "trusted"
#
# Without trust, this file is ignored and Codex falls back to your user config.

# ── Project doc discovery ────────────────────────────────────────────────────
# Codex reads AGENTS.md by default. Tell it to also pick up these as fallbacks
# when AGENTS.md is missing or thin in subdirectories.
project_doc_fallback_filenames = [
  ".codex/AGENTS.md",
  "CLAUDE.md",
  "COMMAND.md",
  ".maestro/engine/workflow.md",
]

# Files that signal "this is a project root" when Codex walks parent directories.
project_root_markers = [
  "AGENTS.md",
  ".maestro/engine/workflow.md",
]

# Cap project doc read size to avoid blowing context on giant AGENTS.md.
project_doc_max_bytes = 65536

# ── Sandbox (filesystem) ─────────────────────────────────────────────────────
# workspace-write is policy support, not the final service write-scope gate.
# Codex may still treat the trusted repository root as writable depending on
# the active user config and CLI version. Service-level write scope remains
# enforced by AGENTS.md, .codex/AGENTS.md, and .maestro/registry/agents.yaml.
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
# Intended workspace-level writable roots. Application source under
# services/<repo>/ is intentionally not listed here; generated coders manage
# their own scopes via .maestro/registry/agents.yaml.
writable_roots = [
  ".maestro",
  "docs",
  "inputs",
  "apps",
  "services",
  "packages",
  "infra",
  "tests",
]
# Outbound network requires explicit approval per session.
network_access = false

# ── Approval policy ──────────────────────────────────────────────────────────
# on-request = Codex pauses to ask before running anything outside the sandbox
# or before doing reversible-but-significant actions.
approval_policy = "on-request"

# ── History persistence ──────────────────────────────────────────────────────
[history]
persistence = "save-all"
max_bytes = 10485760   # 10 MB

# ── Web search ───────────────────────────────────────────────────────────────
# Off by default. Workflow agents pull from .maestro/ indexes and inputs/, not
# the open web. Enable per-session if a task needs it.
web_search = "disabled"

# ── MCP servers ──────────────────────────────────────────────────────────────
# None pre-configured. User can add servers here, e.g.:
#
#   [mcp_servers.filesystem]
#   command = "npx"
#   args = ["-y", "@modelcontextprotocol/server-filesystem", "."]
#
# See https://developers.openai.com/codex/config-reference for the full
# mcp_servers.<id>.* schema.

# ── Model selection ──────────────────────────────────────────────────────────
# Codex CLI picks a default if you do not set `model`. Uncomment and fill in
# the model name your Codex account supports.
# model = "<your-model-id>"
# model_reasoning_effort = "medium"   # minimal | low | medium | high | xhigh

# ── Trust (informational, set elsewhere) ─────────────────────────────────────
# Trust for project-level config is recorded in ~/.codex/config.toml as:
#   [projects."<absolute-path>"]
#   trust_level = "trusted"
# Setting it here in the project file itself has no effect (chicken-and-egg).
