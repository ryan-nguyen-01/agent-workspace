schema_version: "1.0"
role: "artifact-registry"
documentation_root: "docs"

artifact_types:
  - id: "methodology"
    purpose: "Delivery operating model and flow selection rules."
    root: "docs/governance/methodologies"
  - id: "industry-alignment"
    purpose: "Mapping from workspace methodology concepts to current production-agent system patterns."
    root: "docs/governance/methodologies"
  - id: "run"
    purpose: "Execution attempt for a task, including checkpoints, trace links, eval evidence, approvals, and report."
    root: ".maestro/work/runs"
    template: ".maestro/engine/templates/run.template.yaml"
  - id: "checkpoint"
    purpose: "Durable pause/resume point for a run or long task."
    root: ".maestro/work/runs"
    template: ".maestro/engine/templates/checkpoint.template.yaml"
  - id: "trace-summary"
    purpose: "Reviewable summary of agent decisions, tool calls, handoffs, and evidence for a run."
    root: ".maestro/observability/traces"
    template: ".maestro/engine/templates/trace-summary.template.yaml"
  - id: "eval-run"
    purpose: "Eval execution evidence for model, RAG, prompt, or production-agent behavior."
    root: ".maestro/observability/evals"
    template: ".maestro/engine/templates/eval-run.template.yaml"
  - id: "approval-record"
    purpose: "Human or policy approval evidence for gated workflow transitions."
    root: ".maestro/governance/approvals"
    template: ".maestro/engine/templates/approval-record.template.yaml"
  - id: "audit-view"
    purpose: "Curated audit summary derived from work, governance, and history artifacts."
    root: ".maestro/observability/audit"
    template: ".maestro/engine/templates/audit-view.template.md"
  - id: "agent-governance-policy"
    purpose: "Governance policy, hard refusals, and owner obligations for production agents."
    root: "docs/governance/enterprise-agent-governance/policies"
    template: ".maestro/engine/templates/agent-governance-policy.template.md"
    legacy_aliases:
      - "ae-constitution"
  - id: "agent-mission"
    purpose: "Per-agent mission, success criteria, non-goals, termination, and accountable owner."
    root: "docs/governance/enterprise-agent-governance/missions"
    template: ".maestro/engine/templates/agent-mission.template.md"
    legacy_aliases:
      - "ae-agent-mission"
  - id: "agent-behavior-contract"
    purpose: "Typed behavior contract: I/O, refusal, escalation, forbidden tools, tone, and SLA."
    root: "docs/governance/enterprise-agent-governance/behavior-contracts"
    template: ".maestro/engine/templates/agent-behavior-contract.template.md"
    legacy_aliases:
      - "ae-behavior-contract"
  - id: "agent-autonomy-policy"
    purpose: "Granted autonomy level, blast radius, cost cap, and approval boundaries."
    root: "docs/governance/enterprise-agent-governance/autonomy-policies"
    template: ".maestro/engine/templates/agent-autonomy-policy.template.md"
    legacy_aliases:
      - "ae-autonomy-profile"
  - id: "agent-definition"
    purpose: "Agent composition: persona, skills, tools, knowledge, memory, guards, and model routing."
    root: "docs/governance/enterprise-agent-governance/agent-definitions"
    template: ".maestro/engine/templates/agent-definition.template.md"
    legacy_aliases:
      - "ae-agent-genome"
  - id: "agent-eval-suite"
    purpose: "Golden, adversarial, regression, and drift eval definitions."
    root: "docs/governance/enterprise-agent-governance/eval-suites"
    template: ".maestro/engine/templates/agent-eval-suite.template.yaml"
    legacy_aliases:
      - "ae-eval-suite"
  - id: "agent-audit-log"
    purpose: "Append-only version, eval, deployment, incident, and drift record."
    root: "docs/governance/enterprise-agent-governance/audit-logs"
    template: ".maestro/engine/templates/agent-audit-log.template.yaml"
    legacy_aliases:
      - "ae-ledger"
  - id: "agent-interaction-protocol"
    purpose: "Agent-human, agent-agent, and agent-system protocol specs."
    root: "docs/governance/enterprise-agent-governance/interaction-protocols"
    template: ".maestro/engine/templates/agent-interaction-protocol.template.md"
    legacy_aliases:
      - "ae-protocol"
  - id: "vision"
    purpose: "Product direction and intended outcomes."
    root: "docs/product"
  - id: "prd"
    purpose: "Product requirements and success metrics."
    root: "docs/product/prds"
    template: ".maestro/engine/templates/prd.template.md"
  - id: "feature"
    purpose: "Feature scope, business rules, and acceptance criteria."
    root: "docs/requirements/features"
    template: ".maestro/engine/templates/feature.template.md"
  - id: "user-story"
    purpose: "User value and testable acceptance criteria."
    root: "docs/requirements/user-stories"
    template: ".maestro/engine/templates/user-story.template.md"
  - id: "user-flow"
    purpose: "User interaction and system response flow."
    root: "docs/experience/user-flows"
  - id: "hld"
    purpose: "High-level system design and component boundaries."
    root: "docs/architecture/high-level-design"
    template: ".maestro/engine/templates/hld.template.md"
  - id: "lld"
    purpose: "Detailed implementation design."
    root: "docs/architecture/low-level-design"
    template: ".maestro/engine/templates/lld.template.md"
  - id: "adr"
    purpose: "Accepted architecture decision and consequences."
    root: "docs/architecture/decisions"
    template: ".maestro/engine/templates/adr.template.md"
  - id: "test-strategy"
    purpose: "Quality approach, environments, and evidence ownership."
    root: "docs/quality"
  - id: "runbook"
    purpose: "Operational procedures and recovery."
    root: "docs/operations/runbooks"

indexes:
  designs: ".maestro/design/index.yaml"
  decisions: ".maestro/decision/index.yaml"
  work: ".maestro/work/index.yaml"
