# Two-axis classification for scoped delivery. The two axes are INDEPENDENT:
# `class` decides size + how deep verification/QC goes; `cut` decides which layer(s) are touched.
classification:
  # class: depth of work + verification/QC.
  #   slice       — small (~1 unit of work). Level-1 test (unit/build for BE; component/visual for FE).
  #                 Often fast-track-eligible. No integration test, no demo.
  #   integration — larger / cross-cutting. Full verification + QC (unit + integration + contract +
  #                 component + e2e/a11y as applicable). Demo/handoff point.
  class: "slice|integration"
  # cut: which layer(s) the change touches. A horizontal-* task must not mix BE + FE.
  #   vertical      — one feature end-to-end across layers/services (BE + FE + data).
  #   horizontal-be — backend boundaries only (api/services/db), consumed by later FE.
  #   horizontal-fe — frontend experiences only, consuming contracts already ACTIVE.
  cut: "vertical|horizontal-be|horizontal-fe"
  # Keep scope tight: at most ~3 target services/experiences per task (context-budget guard, R-014-20).
  target_count: 0
  reason: ""

# Fast-track lane (workflow.md §6.2). Default false. When true, Coordinator skips
# the R-011-10 user approval gate, and Coder Leader skips the full
# implementation-plan.yaml. product-component fast-track still requires this
# context_plan plus a lightweight service-assignments.yaml before source edits.
# Dev verification, scope, and secrets rules still apply.
fast_track: false
fast_track_reason: ""

acceptance_criteria:
  - id: "AC-1"
    description: "{{DESCRIPTION}}"
    critical: true

out_of_scope: []
# Current-state assessment vs the ACTUAL code (facts with sources, R-024-04) and the chosen direction.
current_state:
  summary: "{{WHAT_EXISTS_TODAY_RELEVANT_TO_THIS_TASK}}"
  evidence: []                # file:line / doc-id per claim
solution_direction:
  chosen: "{{APPROACH}}"
  rationale: "{{WHY}}"
  alternatives_considered: [] # { option, why_not }
impact_analysis:
  affected: []                # components/contracts/users affected and HOW
  regression_surface: []      # what existing behavior could break

impacted_components: []

decomposition:
  required: false
  reason: ""
  target_level: "none|epic|task|subtask"
  child_work_items: []
  dependency_graph: []
  parallelizable_groups: []
  completion_rule: "All required child work items are verified by their declared owner."

# Context plan keeps every later phase fast and auditable. It lists the exact
# memory/source evidence needed for the task and why broader reads are avoided.
context_plan:
  confidence: "low|medium|high"
  budget:
    max_memory_files: 8
    max_source_files: 12
    max_skill_files: 3
  required_memory:
    - path: ".maestro/knowledge/index.yaml"
      reason: "routing index"
    - path: ".maestro/memory/project/feedback/patterns.md"
      reason: "reuse validated feedback patterns when relevant"
    - path: ".maestro/memory/project/feedback/anti-patterns.md"
      reason: "avoid previously observed coding errors when relevant"
  required_source: []
    # - path: "services/<service>/src/entrypoint.ts"
    #   reason: "acceptance criterion AC-1 maps here"
  optional_source: []
  excluded_paths:
    - "node_modules"
    - "vendor"
    - "dist"
    - "build"
    - ".git"
  expansion_triggers:
    - "acceptance criteria cannot be mapped to files"
    - "component boundary, test policy, or contract ownership is unknown"
    - "security/schema/migration/cross-service risk appears"
  unresolved_context: []
  evidence:
    - path: ""
      supports: ""
      confidence: "low|medium|high"

technical_requirements: []
contract_changes:
  apis: []
  events: []
  schemas: []
  ui: []
  config: []

