<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="760" viewBox="0 0 1700 760" role="img" aria-labelledby="title desc">
  <title id="title">Workflow principle flow</title>
  <desc id="desc">Core non-negotiable principles: coordinator entrypoint, analysis before coding, approval gates, uncertainty must trigger clarification (never guessing), blocker stop, evidence before done, and memory sync.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#9ca3af"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#fca5a5"/></marker>
    <style>
      .bg{fill:#111827}.panel{fill:#172033;stroke:#374151;stroke-width:2;rx:18}.title{fill:#f9fafb;font:700 26px Arial}.subtitle{fill:#cbd5e1;font:400 14px Arial}.box{stroke-width:1.5;rx:12}.agent{fill:#1e3a5f;stroke:#60a5fa}.memory{fill:#14532d;stroke:#86efac}.gate{fill:#78350f;stroke:#fbbf24}.stop{fill:#7f1d1d;stroke:#fca5a5}.neutral{fill:#374151;stroke:#9ca3af}.text{fill:#f8fafc;font:700 14px Arial;text-anchor:middle;dominant-baseline:middle}.small{fill:#d1d5db;font:600 12px Arial;text-anchor:middle;dominant-baseline:middle}.edge{fill:none;stroke:#9ca3af;stroke-width:2.2;marker-end:url(#arrow)}.edge-red{fill:none;stroke:#fca5a5;stroke-width:2.2;marker-end:url(#arrow-red)}.label{fill:#e5e7eb;font:700 12px Arial}.label-red{fill:#fecaca;font:700 12px Arial}
    </style>
  </defs>

  <rect class="bg" width="1700" height="760"/>
  <rect class="panel" x="30" y="30" width="1640" height="700"/>
  <text class="title" x="70" y="78">Workflow Principle Flow</text>
  <text class="subtitle" x="70" y="104">Operational rules that must always hold across task execution, QC, and completion</text>

  <rect class="box neutral" x="80" y="150" width="210" height="80"/>
  <text class="text" x="185" y="178">User Request</text>
  <text class="small" x="185" y="202">raw prompt or ticket</text>

  <rect class="box agent" x="330" y="150" width="250" height="80"/>
  <text class="text" x="455" y="178">Coordinator Entrypoint</text>
  <text class="small" x="455" y="202">single router, no bypass</text>

  <rect class="box memory" x="620" y="150" width="240" height="80"/>
  <text class="text" x="740" y="178">Project Brain First</text>
  <text class="small" x="740" y="202">context before scanning</text>

  <rect class="box gate" x="900" y="150" width="250" height="80"/>
  <text class="text" x="1025" y="178">Task Analysis Before Code</text>
  <text class="small" x="1025" y="202">no coding without analysis</text>

  <rect class="box gate" x="1190" y="150" width="290" height="80"/>
  <text class="text" x="1335" y="178">Approval Gates</text>
  <text class="small" x="1335" y="202">coder creation, scope, analysis sign-off</text>

  <rect class="box gate" x="1190" y="250" width="290" height="70"/>
  <text class="text" x="1335" y="276">Uncertainty Gate</text>
  <text class="small" x="1335" y="298">not sure -> ask user, never guess</text>

  <rect class="box agent" x="80" y="340" width="320" height="80"/>
  <text class="text" x="240" y="368">Scoped Service Coding</text>
  <text class="small" x="240" y="392">allowed paths and contracts only</text>

  <rect class="box gate" x="450" y="340" width="320" height="80"/>
  <text class="text" x="610" y="368">Dev Verification Gate</text>
  <text class="small" x="610" y="392">critical checks + policy compliance</text>

  <rect class="box stop" x="820" y="340" width="300" height="80"/>
  <text class="text" x="970" y="368">Blocker Stops QC</text>
  <text class="small" x="970" y="392">must route bug before continuing</text>

  <rect class="box memory" x="1170" y="340" width="310" height="80"/>
  <text class="text" x="1325" y="368">Evidence Before Done</text>
  <text class="small" x="1325" y="392">artifacts, test results, verification proof</text>

  <rect class="box memory" x="540" y="540" width="270" height="80"/>
  <text class="text" x="675" y="568">Memory Update</text>
  <text class="small" x="675" y="592">persist durable decisions</text>

  <rect class="box memory" x="860" y="540" width="220" height="80"/>
  <text class="text" x="970" y="568">DONE</text>
  <text class="small" x="970" y="592">workflow complete</text>

  <path class="edge" d="M290 190H330"/>
  <path class="edge" d="M580 190H620"/>
  <path class="edge" d="M860 190H900"/>
  <path class="edge" d="M1150 190H1190"/>
  <path class="edge" d="M1335 230V250"/>
  <path class="edge" d="M1335 320C1335 330 920 305 610 340"/>
  <path class="edge" d="M400 380H450"/>
  <path class="edge" d="M770 380H820"/>
  <path class="edge" d="M1120 380H1170"/>
  <path class="edge" d="M1325 420C1325 500 760 495 675 540"/>
  <path class="edge" d="M810 580H860"/>

  <path class="edge-red" d="M970 340C970 300 770 300 610 340"/>
  <text class="label-red" x="840" y="305">fix cycle returns through verification</text>

  <text class="label" x="1260" y="150">governance path</text>
  <text class="label" x="110" y="500">finalization path</text>
</svg>