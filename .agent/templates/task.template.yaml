task_id: "{{TASK_ID}}" # Format: TASK-YYYYMMDD-NNN-slug
task_number: "{{TASK_NUMBER}}"
slug: "{{TASK_SLUG}}"
folder: ".runtime/tasks/{{TASK_ID}}"
state: "NEW"
created_at: "{{CREATED_AT}}"
updated_at: "{{UPDATED_AT}}"
owner: "coordinator"

source:
  type: "HLD|LLD|ticket|text|bug-report|incident|other"
  artifact: ".runtime/tasks/{{TASK_ID}}/task-input.md"

artifacts:
  task_manifest: ".runtime/tasks/{{TASK_ID}}/task.yaml"
  task_updates: ".runtime/tasks/{{TASK_ID}}/task-updates.yaml"
  task_analysis: ".runtime/tasks/{{TASK_ID}}/task-analysis.yaml"
  architecture_review: ".runtime/tasks/{{TASK_ID}}/architecture-review.yaml"
  implementation_plan: ".runtime/tasks/{{TASK_ID}}/implementation-plan.yaml"
  service_assignments: ".runtime/tasks/{{TASK_ID}}/service-assignments.yaml"
  coder_results: ".runtime/tasks/{{TASK_ID}}/coder-results.yaml"
  dev_verification: ".runtime/tasks/{{TASK_ID}}/dev-verification.yaml"
  qc_handoff: ".runtime/tasks/{{TASK_ID}}/qc-handoff.md"
  qc_results: ".runtime/tasks/{{TASK_ID}}/qc-test-results.yaml"
  qc_delivery_report: ".runtime/tasks/{{TASK_ID}}/qc-delivery-report.md"
  bugs: ".runtime/tasks/{{TASK_ID}}/bugs.yaml"
  memory_updates: ".runtime/tasks/{{TASK_ID}}/memory-updates.yaml"

history:
  - at: "{{CREATED_AT}}"
    by: "coordinator"
    from: null
    to: "NEW"
    note: "Task created"

update_policy:
  append_updates_to: ".runtime/tasks/{{TASK_ID}}/task-updates.yaml"
  do_not_create_external_qc_mirror: true
  consolidate_coder_outputs_in: ".runtime/tasks/{{TASK_ID}}/coder-results.yaml"
