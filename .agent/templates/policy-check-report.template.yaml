policy_check_id: "POLICY-{{YYYYMMDD}}-{{NNN}}"
checked_at: "{{ISO8601}}"
checked_by: "workflow-policy"
scope: "workspace|snapshot|task|transition|exception"
root: "{{WORKSPACE_OR_SNAPSHOT_ROOT}}"

source_context:
  services_available: "true|false|unknown"
  artifact_only_snapshot: "true|false"
  note: "If services_available=false, validate recorded artifacts only; do not classify missing services/ as a project defect."

state_summary:
  workflow_state:
    distribution_mode: "{{workflow-state.distribution_mode}}"
    instance_status: "{{workflow-state.instance_status}}"
    current_state: "{{workflow-state.current_state}}"
    active_task_id: "{{workflow-state.active_task_id}}"
  project_brain:
    distribution_mode: "{{project-brain.distribution.mode}}"
    instance_status: "{{project-brain.distribution.instance_status}}"
  service_catalog:
    status: "{{service-catalog.status}}"
  agent_registry:
    status: "{{agent-registry.status}}"
    active_or_approved_coder_count: 0
  model_routing:
    status: "{{model-routing.status}}"
  agent_activity:
    status: "{{agent-activity.status}}"
  response_ui:
    status: "{{response-ui.status}}"
    default_status_mode: "{{response-ui.defaults.status_mode}}"

checks:
  mode_consistency:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  dev_done_gate:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  qc_done_gate:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  artifact_manifest_consistency:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  agent_registry_consistency:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  context_plan_gate:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  approval_gate_consistency:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  model_routing_consistency:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  activity_telemetry_consistency:
    status: "pass|fail|not_applicable|unknown"
    evidence: []
  response_ui_consistency:
    status: "pass|fail|not_applicable|unknown"
    evidence: []

findings:
  - severity: "P0|P1|P2|INFO"
    code: "{{FINDING_CODE}}"
    message: "{{SHORT_MESSAGE}}"
    evidence:
      - "{{file:path or artifact reference}}"
    recommendation: "{{required next action}}"

repair_plan:
  repair_available: "true|false"
  requires_user_approval: "true|false"
  allowed_write_paths:
    - ".runtime/context/workflow-state.yaml"
  forbidden_write_paths:
    - "services/"
    - "inputs/"
    - ".runtime/context/project-brain.yaml"
    - ".runtime/context/service-catalog.yaml"
    - ".runtime/context/agent-registry.yaml"
  proposed_changes: []

decision:
  policy_decision: "allow|deny|needs_user_approval"
  reason: "{{concise reason}}"
  required_next_action: "{{command or action}}"
