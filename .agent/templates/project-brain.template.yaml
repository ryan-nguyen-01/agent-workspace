version: 2
distribution:
  # Use framework-template only in the reusable agent-workspace distribution.
  # Workspace onboarding should replace/remove this block or set mode to workspace.
  mode: "{{DISTRIBUTION_MODE}}"              # framework-template | workspace
  instance_status: "{{INSTANCE_STATUS}}"     # not_applied | applied | onboarded
  onboarding_expected: "{{ONBOARDING_SCOPE}}" # workspace-services | complete
  notes: []
project:
  name: "{{PROJECT_NAME}}"
  slug: "{{PROJECT_SLUG}}"
  repository_type: "unknown|monolith|modular-monolith|monorepo|microservices"
  primary_languages: []
  frameworks: []
  package_managers: []
  generated_at: "{{GENERATED_AT}}"
  generated_by: "onboarding"

memory:
  role: "agent-brain"
  root: ".runtime/context"
  index: ".runtime/context/index.yaml"
  service_memory_root: ".runtime/context/services"
  service_workspace_root: "services"
  state_file: ".runtime/context/workflow-state.yaml"
  read_policy:
    - "Read .runtime/context/index.yaml before opening large memory files."
    - "Read only relevant memory files for the current task/service."

freshness:
  repo_reference: "{{COMMIT_OR_HASH}}"
  memory_epoch: 1
  stale: false
  stale_reasons: []
  partial_rescan_targets: []
  # Drift detection fields consumed by Coordinator startup.
  last_indexed_at: "{{GENERATED_AT}}"          # YYYY-MM-DD; updated by onboarding/sync-memory
  stale_after_days: 14                          # threshold; raise for slow-moving projects
  tracked_paths:                                # directories whose mtimes signal possible drift
    - "services"
    - "src"
    - "packages"
    - "apps"
    - "inputs"
  last_drift_check_at: ""
  last_drift_check_result: "unknown"            # fresh | stale | unknown

# User-provided reference docs scanned by Onboarding (R-002-09..12).
# Detailed index lives in .runtime/context/inputs-index.yaml.
inputs:
  root: "inputs"
  index: ".runtime/context/inputs-index.yaml"
  categories: ["product", "architecture", "api", "domain", "runbooks", "misc"]
  last_scanned_at: ""
  file_count: 0

# Conflicts between inputs/ and source code (R-002-11).
# Each entry: {fact, code_source, inputs_source, resolution, decided_at}
conflicts: []

architecture:
  summary: "{{ARCHITECTURE_SUMMARY}}"
  services: []
  shared_libraries: []
  databases: []
  queues: []
  external_integrations: []

service_boundaries:
  catalog: ".runtime/context/service-catalog.yaml"
  agent_registry: ".runtime/context/agent-registry.yaml"
  test_policy: ".runtime/context/test-policy.yaml"
  rule: "Actual application code lives in each service.path from .runtime/context/service-catalog.yaml."

policies:
  workflow: "end-to-end"
  coder_creation_requires_user_approval: true
  code_done_threshold: 0.80
  qc_handoff_required: true
  blocker_stops_qc: true
  non_blocker_allows_parallel_fix: true

memory_rules:
  never_store:
    - secrets
    - passwords
    - raw tokens
    - long logs
  store_when:
    - architecture decision
    - service boundary change
    - test policy change
    - bug root cause pattern
    - user approved exception

# Deep project intelligence populated by onboarding.
deep_project_intelligence:
  status: "needs_onboarding|partial|complete"
  reusable_assets:
    utilities: []
    shared_components: []
    base_classes: []
    hooks: []
    middleware: []
    validators: []
    mappers_serializers: []
    error_handling: []
    logging: []
    auth_helpers: []
    db_transaction_helpers: []
    event_queue_helpers: []
    payment_helpers: []
    notification_helpers: []
    test_helpers: []
  coding_conventions:
    folder_structure: []
    naming_rules: []
    layering_rules: []
    api_patterns: []
    validation_patterns: []
    error_handling_patterns: []
    logging_patterns: []
    transaction_patterns: []
    async_job_patterns: []
    migration_patterns: []
    testing_patterns: []
    configuration_patterns: []
  business_flows:
    - id: ""
      name: ""
      description: ""
      entrypoints: []
      services: []
      steps: []
      data_entities: []
      external_integrations: []
      events_emitted: []
      events_consumed: []
      reusable_assets: []
      critical_checks: []
      evidence: []
      confidence: "low|medium|high"
  reuse_rules:
    - rule: ""
      existing_asset: ""
      existing_path: ""
      applies_to: []
      must_reuse: true
      evidence: []
      confidence: "low|medium|high"
  anti_patterns:
    - rule: ""
      reason: ""
      examples_to_avoid: []
      safer_alternative: ""
      evidence: []
      confidence: "low|medium|high"
  evidence_index:
    - topic: ""
      paths: []
      reason: ""
      confidence: "low|medium|high"
