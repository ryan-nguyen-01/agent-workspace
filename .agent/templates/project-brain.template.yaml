version: 2
distribution:
  # Use framework-template only in the reusable agent-workspace distribution.
  # Workspace onboarding should replace/remove this block or set mode to workspace.
  mode: "{{DISTRIBUTION_MODE}}"              # framework-template | workspace
  instance_status: "{{INSTANCE_STATUS}}"     # not_applied | applied | onboarded
  onboarding_expected: "{{ONBOARDING_SCOPE}}" # workspace-services | complete
  notes: []
project:
  name: "{{PROJECT_NAME}}"
  slug: "{{PROJECT_SLUG}}"
  repository_type: "unknown|single-repo|polyrepo-workspace|monolith|modular-monolith|monorepo|microservices|library|cli|mobile|desktop|data-ml|infrastructure|docs-only|embedded|workflow-framework"
  primary_languages: []
  frameworks: []
  package_managers: []
  generated_at: "{{GENERATED_AT}}"
  generated_by: "onboarding"

project_profile:
  archetypes: []
    # Examples: backend-api, frontend-web, mobile-app, desktop-app, cli-tool,
    # library-sdk, data-pipeline, ml-model, infra-iac, embedded-firmware,
    # docs-site, docs-and-templates, plugin-extension, monorepo-platform, workflow-framework.
  confidence: "low|medium|high"
  evidence: []
  source_layout:
    service_roots: []
    app_roots: []
    package_roots: []
    shared_code_roots: []
    infra_roots: []
    data_roots: []
    docs_roots: []
    generated_or_vendor_roots: []
  critical_manifests: []
    # package.json, pyproject.toml, go.mod, pom.xml, Cargo.toml, pubspec.yaml,
    # Package.swift, build.gradle, docker-compose.yml, terraform files, etc.
  boundary_strategy: "service-catalog|monorepo-packages|single-service|docs-only|unknown"
  onboarding_scan_profile: "signature-first|standard|deep-required"

memory:
  role: "agent-brain"
  root: ".runtime/context"
  index: ".runtime/context/index.yaml"
  service_memory_root: ".runtime/context/services"
  service_workspace_root: "services"
  state_file: ".runtime/context/workflow-state.yaml"
  model_routing_file: ".runtime/context/model-routing.yaml"
  agent_activity_file: ".runtime/context/agent-activity.yaml"
  response_ui_file: ".runtime/context/response-ui.yaml"
  read_policy:
    - "Read .runtime/context/index.yaml before opening large memory files."
    - "Read only relevant memory files for the current task/service."

context_economy:
  goal: "High recall with bounded reads: agents start from indexes and expand only when confidence or task risk requires it."
  default_context_budget:
    coordinator_files: 4
    task_analysis_files: 12
    coder_leader_files: 16
    service_coder_files: 20
    verification_files: 12
  always_read:
    - ".agent/workflow.md"
    - ".runtime/context/workflow-state.yaml"
    - ".runtime/context/index.yaml"
  read_order:
    - "task artifact or user input"
    - "memory index rows matching tags/service_ids/paths"
    - "project profile and service catalog summaries"
    - "impacted service brain summaries"
    - "specific source files referenced by evidence"
  expansion_triggers:
    - "impacted service cannot be resolved"
    - "acceptance criteria map to unknown files"
    - "contract/schema/security/test policy risk is present"
    - "confidence is low or evidence is stale"
    - "implementation touches shared code or cross-service behavior"
  stop_before_coding_when:
    - "context_plan.confidence is low"
    - "required evidence is missing"
    - "service boundary is unknown"
    - "test policy is unknown for impacted service"
  never_read_by_default:
    - "node_modules"
    - "vendor"
    - "dist"
    - "build"
    - ".next"
    - "coverage"
    - ".git"
    - "large generated files"

freshness:
  repo_reference: "{{COMMIT_OR_HASH}}"
  memory_epoch: 1
  stale: false
  stale_reasons: []
  partial_rescan_targets: []
  # Drift detection fields consumed by Coordinator startup.
  last_indexed_at: "{{GENERATED_AT}}"          # YYYY-MM-DD; updated by onboarding/sync-memory
  stale_after_days: 14                          # threshold; raise for slow-moving projects
  tracked_paths:                                # directories whose mtimes signal possible drift
    - "services"
    - "src"
    - "packages"
    - "apps"
    - "inputs"
  last_drift_check_at: ""
  last_drift_check_result: "unknown"            # fresh | stale | unknown

# User-provided reference docs scanned by Onboarding (R-002-09..12).
# Detailed index lives in .runtime/context/inputs-index.yaml.
inputs:
  root: "inputs"
  index: ".runtime/context/inputs-index.yaml"
  categories: ["product", "architecture", "api", "domain", "runbooks", "misc"]
  last_scanned_at: ""
  file_count: 0

# Conflicts between inputs/ and source code (R-002-11).
# Each entry: {fact, code_source, inputs_source, resolution, decided_at}
conflicts: []

architecture:
  summary: "{{ARCHITECTURE_SUMMARY}}"
  services: []
  shared_libraries: []
  databases: []
  queues: []
  external_integrations: []

service_boundaries:
  catalog: ".runtime/context/service-catalog.yaml"
  agent_registry: ".runtime/context/agent-registry.yaml"
  test_policy: ".runtime/context/test-policy.yaml"
  rule: "Actual application code lives in each service.path from .runtime/context/service-catalog.yaml, normally services/<service-name>. The service control plane lives in .runtime/context, not services/."

policies:
  workflow: "end-to-end"
  coder_creation_requires_user_approval: true
  code_done_threshold: 0.80
  qc_handoff_required: true
  blocker_stops_qc: true
  non_blocker_allows_parallel_fix: true

memory_rules:
  never_store:
    - secrets
    - passwords
    - raw tokens
    - long logs
  store_when:
    - architecture decision
    - service boundary change
    - test policy change
    - bug root cause pattern
    - user approved exception

# Deep project intelligence populated by onboarding.
deep_project_intelligence:
  status: "needs_onboarding|partial|complete"
  reusable_assets:
    utilities: []
    shared_components: []
    base_classes: []
    hooks: []
    middleware: []
    validators: []
    mappers_serializers: []
    error_handling: []
    logging: []
    auth_helpers: []
    db_transaction_helpers: []
    event_queue_helpers: []
    payment_helpers: []
    notification_helpers: []
    test_helpers: []
  coding_conventions:
    folder_structure: []
    naming_rules: []
    layering_rules: []
    api_patterns: []
    validation_patterns: []
    error_handling_patterns: []
    logging_patterns: []
    transaction_patterns: []
    async_job_patterns: []
    migration_patterns: []
    testing_patterns: []
    configuration_patterns: []
  business_flows:
    - id: ""
      name: ""
      description: ""
      entrypoints: []
      services: []
      steps: []
      data_entities: []
      external_integrations: []
      events_emitted: []
      events_consumed: []
      reusable_assets: []
      critical_checks: []
      evidence: []
      confidence: "low|medium|high"
  reuse_rules:
    - rule: ""
      existing_asset: ""
      existing_path: ""
      applies_to: []
      must_reuse: true
      evidence: []
      confidence: "low|medium|high"
  anti_patterns:
    - rule: ""
      reason: ""
      examples_to_avoid: []
      safer_alternative: ""
      evidence: []
      confidence: "low|medium|high"
  evidence_index:
    - topic: ""
      paths: []
      reason: ""
      confidence: "low|medium|high"
