task_id: "{{TASK_ID}}"
source_type: "HLD|LLD|ticket|text|bug-report|incident|other"
created_at: "{{CREATED_AT}}"
analyzed_by: "task-analysis"

intent: "feature|bugfix|refactor|migration|security|docs|test|ops|typo|comment|format|rename-local|docs-only|dependency-version-bump|config-value-tweak|unknown"
summary: "{{SUMMARY}}"
business_goal: "{{BUSINESS_GOAL}}"

# Two-axis classification (adapted from ADLC wave model). The two axes are INDEPENDENT:
# `class` decides size + how deep verification/QC goes; `cut` decides which layer(s) are touched.
classification:
  # class: depth of work + verification/QC.
  #   slice       — small (~1 unit of work). Test cấp 1 (unit/build for BE; component/visual for FE).
  #                 Often fast-track-eligible. No integration test, no demo.
  #   integration — larger / cross-cutting. Full verification + QC (unit + integration + contract +
  #                 component + e2e/a11y as applicable). Demo/handoff point.
  class: "slice|integration"
  # cut: which layer(s) the change touches. A horizontal-* task must not mix BE + FE.
  #   vertical      — one feature end-to-end across layers/services (BE + FE + data).
  #   horizontal-be — backend boundaries only (api/services/db), consumed by later FE.
  #   horizontal-fe — frontend experiences only, consuming contracts already ACTIVE.
  cut: "vertical|horizontal-be|horizontal-fe"
  # Keep scope tight: at most ~3 target services/experiences per task (context-budget guard, R-014-20).
  target_count: 0
  reason: ""

# Fast-track lane (workflow.md §6.2). Default false. When true, Coordinator skips
# the R-011-10 user approval gate, and Coder Leader skips the full
# implementation-plan.yaml. Applied-service fast-track still requires this
# context_plan plus a lightweight service-assignments.yaml before source edits.
# Dev verification, scope, and secrets rules still apply.
fast_track: false
fast_track_reason: ""

acceptance_criteria:
  - id: "AC-1"
    description: "{{DESCRIPTION}}"
    critical: true

out_of_scope: []
impacted_services: []

# Context plan keeps every later phase fast and auditable. It lists the exact
# memory/source evidence needed for the task and why broader reads are avoided.
context_plan:
  confidence: "low|medium|high"
  budget:
    max_memory_files: 8
    max_source_files: 12
    max_skill_files: 3
  required_memory:
    - path: ".runtime/context/index.yaml"
      reason: "routing index"
    - path: ".runtime/context/feedback/patterns.md"
      reason: "reuse validated feedback patterns when relevant"
    - path: ".runtime/context/feedback/anti-patterns.md"
      reason: "avoid previously observed coding errors when relevant"
  required_source: []
    # - path: "services/<service>/src/entrypoint.ts"
    #   reason: "acceptance criterion AC-1 maps here"
  optional_source: []
  excluded_paths:
    - "node_modules"
    - "vendor"
    - "dist"
    - "build"
    - ".git"
  expansion_triggers:
    - "acceptance criteria cannot be mapped to files"
    - "service boundary, test policy, or contract ownership is unknown"
    - "security/schema/migration/cross-service risk appears"
  unresolved_context: []
  evidence:
    - path: ""
      supports: ""
      confidence: "low|medium|high"

technical_requirements: []
contract_changes:
  apis: []
  events: []
  schemas: []
  ui: []
  config: []

# Optional architecture gate. Required for cross-service/API/data/event/security/
# infra boundary changes before Coder Leader plans implementation.
architecture_review:
  required: false
  reason: ""
  triggers: []
  output_required: ".runtime/tasks/{{TASK_ID}}/architecture-review.yaml"

# Specialist advisors to invoke in-pipeline (advisor-only, see R-016).
# List specialist ids from .claude/agents/specialists/<category>/. Each writes
# .runtime/tasks/{{TASK_ID}}/advisories/<id>.yaml; the owning workflow agent resolves
# handoff.must_address before proceeding. Leave empty when no advisory is needed.
advisory_required: []
  # - id: "security-auditor"
  #   reason: "auth/PII surface"
  #   invoke_at: "DEV_VERIFYING"   # state where the owning agent calls it

# Design references for UI/frontend tasks (optional — omit for non-UI tasks)
design_references:
  figma_urls: []
    # - url: "https://figma.com/design/..."
    #   node_id: ""
    #   description: ""
  screenshots: []
    # - path: ".runtime/tasks/{{TASK_ID}}/assets/mockup.png"
    #   description: ""
  design_notes: ""
  component_specs: []
    # - component: ""
    #   states: []
    #   responsive_breakpoints: []
    #   interactions: []

risks: []
blockers: []
dependencies: []

assumptions:
  - statement: ""
    confidence: "high|medium|low"
    impact_if_wrong: "low|medium|high"
    needs_user_confirmation: false

unknowns: []

requires_user_clarification: false
clarifying_questions: []

critical_checks:
  - id: "{{CHECK_ID}}"
    description: "{{DESCRIPTION}}"
    reason: "{{WHY_CRITICAL}}"

dev_verification_checklist: []
qc_focus: []

# Reuse and convention analysis required before implementation.
reuse_and_convention_analysis:
  project_flows_relevant: []
  service_flows_relevant: []
  reusable_assets_to_use: []
  coding_conventions_to_follow: []
  feedback_patterns_to_apply: []
  anti_patterns_to_avoid: []
  known_error_patterns_to_avoid: []
  new_reusable_asset_needed:
    required: false
    reason: ""
    approval_or_leader_review_required: true
  evidence: []
